# Dev uses DATABASE_URL from .env. Maintainers can keep pointing at the shared
# PG cluster, while open-source/local clones can opt into Postgres with:
#   docker compose --profile local-db up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: beaconhs-postgres
    profiles:
      - local-db
    environment:
      POSTGRES_USER: beaconhs
      POSTGRES_PASSWORD: beaconhs
      POSTGRES_DB: beaconhs
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beaconhs -d beaconhs"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: beaconhs-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: beaconhs-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: beaconhs
      MINIO_ROOT_PASSWORD: beaconhs-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: beaconhs-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres-data:
  redis-data:
  minio-data:
