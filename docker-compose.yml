# Dev uses DATABASE_URL from .env. Maintainers can keep pointing at the shared
# PG cluster, while open-source/local clones can opt into Postgres with:
#   docker compose --profile local-db up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: beaconhs-postgres
    profiles:
      - local-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: beaconhs
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/cluster/local-init.sh:/docker-entrypoint-initdb.d/10-beaconhs-roles.sh:ro
      - ./scripts/cluster/provision.sql:/opt/beaconhs/provision.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U beaconhs_app -d beaconhs']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: beaconhs-redis
    ports:
      - '6380:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: beaconhs-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: beaconhs
      MINIO_ROOT_PASSWORD: beaconhs-dev-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: beaconhs-mailpit
    ports:
      - '1025:1025'
      - '8025:8025'

  # In-browser PowerPoint editor for PPTX-mastered training decks. The app
  # iframes http://localhost:9980; Collabora calls back into the app's
  # /wopi/files/* routes at host.docker.internal:3000 (COLLABORA_WOPI_URL).
  collabora:
    image: collabora/code:latest
    container_name: beaconhs-collabora
    environment:
      # Allow the WOPI host (this app, as seen from inside the container).
      - aliasgroup1=http://host.docker.internal:3000
      # Plain http locally + let the app's origin iframe the editor. Welcome
      # ("Explore the new version") dialogs are noise inside an embedded editor.
      - extra_params=--o:ssl.enable=false --o:ssl.termination=false --o:net.frame_ancestors=http://localhost:3000 --o:welcome.enable=false --o:home_mode.enable=true
    ports:
      - '9980:9980'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      # BeaconHS theme via the sanctioned branding.js hook (navy header etc.).
      - ./deploy/collabora-branding.js:/usr/share/coolwsd/browser/dist/branding.js:ro
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
