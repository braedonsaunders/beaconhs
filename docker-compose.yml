# NOTE: there is no local Postgres container. Dev connects DIRECTLY to the shared HA
# cluster at 10.0.0.85:5432 (DATABASE_URL in .env). See docs/migration/cluster-setup.md.
services:
  redis:
    image: redis:7-alpine
    container_name: beaconhs-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: beaconhs-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: beaconhs
      MINIO_ROOT_PASSWORD: beaconhs-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: beaconhs-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  redis-data:
  minio-data:
