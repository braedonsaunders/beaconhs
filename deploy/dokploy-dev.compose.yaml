# BeaconHS dev stack for Dokploy.
#
# The GitHub deploy workflow injects all ${VARS} at deploy time. The same image
# runs web, worker, and scheduler roles selected by APP_ROLE.

services:
  web:
    image: ${IMAGE}
    environment:
      APP_ROLE: web
      NODE_ENV: production
      # Next standalone must listen on all interfaces for the reverse proxy.
      HOSTNAME: 0.0.0.0
      PORT: '3000'
      DATABASE_URL: ${DATABASE_URL}
      # Dedicated BYPASSRLS pool for super-admin / cross-tenant access.
      SUPERADMIN_DATABASE_URL: ${SUPERADMIN_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${APP_URL}
      APP_URL: ${APP_URL}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      # Web serves the public key to the subscribe client and signs the
      # "send test push" action, so it needs the full keypair too.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      # In-browser PowerPoint editor. Collabora is served SAME-ORIGIN on the
      # app domain via Traefik path routes (/browser, /cool, /hosting), so the
      # editor URL and the WOPI callback base are both just APP_URL.
      COLLABORA_URL: ${COLLABORA_URL}
      COLLABORA_WOPI_URL: ${COLLABORA_WOPI_URL}
    networks: [infra-net, dokploy-network]
    deploy:
      replicas: 1
      placement:
        constraints: [node.hostname==dokploy-mgr]
      restart_policy:
        condition: any
        delay: 5s

  worker:
    image: ${IMAGE}
    environment:
      APP_ROLE: worker
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      # Super-admin / cross-tenant pool; DIRECT (un-pooled) for DDL maintenance jobs.
      SUPERADMIN_DATABASE_URL: ${SUPERADMIN_DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      APP_URL: ${APP_URL}
      # Worker fans push notifications out to subscribed devices.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    networks: [infra-net]
    deploy:
      replicas: 1
      placement:
        constraints: [node.hostname==dokploy-mgr]
      restart_policy:
        condition: any
        delay: 5s

  scheduler:
    image: ${IMAGE}
    environment:
      APP_ROLE: scheduler
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    networks: [infra-net]
    deploy:
      replicas: 1
      placement:
        constraints: [node.hostname==dokploy-mgr]
      # One-shot: register BullMQ repeatable jobs, then exit.
      restart_policy:
        condition: on-failure
        delay: 5s

  # In-browser PowerPoint editor for PPTX-mastered training decks. Reached by
  # browsers and by the web app (discovery) through Traefik path routes on the
  # app domain; Collabora itself calls back into the app's /wopi/files/* routes
  # at APP_URL (aliasgroup1 allow-list).
  collabora:
    image: collabora/code:latest
    environment:
      aliasgroup1: ${APP_URL}
      server_name: ${COLLABORA_SERVER_NAME}
      # TLS terminates at Traefik; frame_ancestors lets the app iframe the editor.
      extra_params: --o:ssl.enable=false --o:ssl.termination=true --o:net.frame_ancestors=${APP_URL}
    networks: [dokploy-network]
    deploy:
      replicas: 1
      placement:
        constraints: [node.hostname==dokploy-mgr]
      restart_policy:
        condition: any
        delay: 5s

networks:
  infra-net:
    external: true
  dokploy-network:
    external: true
