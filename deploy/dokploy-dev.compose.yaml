# BeaconHS dev stack for Dokploy.
#
# The GitHub deploy workflow injects all ${VARS} at deploy time. The same image
# runs web, worker, and scheduler roles selected by APP_ROLE.

services:
  web:
    image: ${IMAGE}
    environment:
      APP_ROLE: web
      NODE_ENV: production
      # Next standalone must listen on all interfaces for the reverse proxy.
      HOSTNAME: 0.0.0.0
      PORT: '3000'
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${APP_URL}
      APP_URL: ${APP_URL}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      # Web serves the public key to the subscribe client and signs the
      # "send test push" action, so it needs the full keypair too.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    networks: [infra-net, dokploy-network]
    deploy:
      replicas: 1
      placement:
        constraints: [node.hostname==dokploy-mgr]
      restart_policy:
        condition: any
        delay: 5s

  worker:
    image: ${IMAGE}
    environment:
      APP_ROLE: worker
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      APP_URL: ${APP_URL}
      # Worker fans push notifications out to subscribed devices.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    networks: [infra-net]
    deploy:
      replicas: 1
      placement:
        constraints: [node.hostname==dokploy-mgr]
      restart_policy:
        condition: any
        delay: 5s

  scheduler:
    image: ${IMAGE}
    environment:
      APP_ROLE: scheduler
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
    networks: [infra-net]
    deploy:
      replicas: 1
      placement:
        constraints: [node.hostname==dokploy-mgr]
      # One-shot: register BullMQ repeatable jobs, then exit.
      restart_policy:
        condition: on-failure
        delay: 5s

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--save', '60', '1', '--appendonly', 'no']
    volumes:
      - redis-data:/data
    networks: [infra-net]
    deploy:
      replicas: 1
      placement:
        constraints: [node.hostname==dokploy-mgr]

networks:
  infra-net:
    external: true
  dokploy-network:
    external: true

volumes:
  redis-data:
