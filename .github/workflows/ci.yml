name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: beaconhs
          POSTGRES_PASSWORD: beaconhs
          POSTGRES_DB: beaconhs_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U beaconhs"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://beaconhs:beaconhs@localhost:5432/beaconhs_test
      REDIS_URL: redis://localhost:6379
      BETTER_AUTH_SECRET: ci-secret-not-used-in-prod
      BETTER_AUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      # No version here — package.json's packageManager field pins pnpm; passing
      # both errors "Multiple versions of pnpm specified". Node 22 to match the
      # deploy image (require(esm) support needed by `pnpm build`).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm db:push:ci
      - run: pnpm test
      - run: pnpm build
