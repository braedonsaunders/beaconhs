name: Deploy (dev)

# Standard dev deployment, called by the CI workflow after its gate job passes
# for the same main-branch commit: build and push the commit's image, run the
# forward-only database migrations, point the Dokploy compose at the new image
# digest, redeploy, and wait for exact-SHA readiness. Images are built on
# GitHub-hosted runners; migration and deployment run on the Dokploy runner.
# All deployment-specific values live in repository secrets.

on:
  workflow_call:
    inputs:
      ci_gate_completed:
        description: Set only by the CI caller after its gate job succeeds
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/braedonsaunders/beaconhs
  COLLABORA_IMAGE: collabora/code:26.04.2.1.1@sha256:df33af88c59e26b7335ea98d91e65f1edf13f33369ce6115941b8d59d3409cb5

jobs:
  build:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      image_digest: ${{ steps.build-image.outputs.digest }}
    steps:
      - name: Require the gated main-branch CI caller
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          CI_GATE_COMPLETED: ${{ inputs.ci_gate_completed }}
        run: |
          set -euo pipefail
          if [ "$REF" != refs/heads/main ] || [ "$CI_GATE_COMPLETED" != true ] \
            || { [ "$EVENT_NAME" != push ] && [ "$EVENT_NAME" != workflow_dispatch ]; }; then
            echo "::error::Dev deployment must be called by the main-branch CI workflow after its gate job succeeds"
            exit 1
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Reject stale main-branch workflow runs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: scripts/ci/require-current-main.sh
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build-image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          build-args: |
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          # ignore-error: the GHA cache backend intermittently fails the blob
          # write ("error writing layer blob: not_found") AFTER the image is
          # already pushed — don't let a cache hiccup fail the build/deploy.
          cache-to: type=gha,mode=max,ignore-error=true

  deploy:
    needs: build
    permissions:
      contents: read
      packages: read
    runs-on: [self-hosted, dokploy]
    timeout-minutes: 45
    env:
      IMAGE_DIGEST: ${{ needs.build.outputs.image_digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Validate immutable build output
        run: |
          set -euo pipefail
          if ! [[ "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::The image build did not return a canonical sha256 digest"
            exit 1
          fi
          echo "Deploying immutable image ${IMAGE_NAME}@${IMAGE_DIGEST}"
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with: { node-version: 24.18.0 }
      # Install Node first: the self-hosted runner's system Node is not a
      # supported application runtime, and pnpm's installer invokes npm.
      # package.json's packageManager field pins pnpm; passing a version here
      # too errors with "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - run: pnpm install --frozen-lockfile

      - name: Configure TLS-preserving Dokploy split-DNS resolution
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_RESOLVE_IP: ${{ secrets.DOKPLOY_RESOLVE_IP }}
        run: |
          set -euo pipefail
          dokploy_host="${DOKPLOY_URL#https://}"
          if [ "$dokploy_host" = "$DOKPLOY_URL" ] \
            || [ "${#dokploy_host}" -gt 253 ] \
            || ! [[ "$dokploy_host" =~ ^([A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?\.)+[A-Za-z]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?$ ]]; then
            echo "::error::DOKPLOY_URL must be an HTTPS origin with a DNS hostname, no port, path, query, fragment, or trailing slash"
            exit 1
          fi
          if ! [[ "$DOKPLOY_RESOLVE_IP" =~ ^(0|[1-9][0-9]{0,2})\.(0|[1-9][0-9]{0,2})\.(0|[1-9][0-9]{0,2})\.(0|[1-9][0-9]{0,2})$ ]]; then
            echo "::error::DOKPLOY_RESOLVE_IP must be a canonical private IPv4 address"
            exit 1
          fi
          IFS=. read -r ip_a ip_b ip_c ip_d <<< "$DOKPLOY_RESOLVE_IP"
          for octet in "$ip_a" "$ip_b" "$ip_c" "$ip_d"; do
            if [ "$((10#$octet))" -gt 255 ]; then
              echo "::error::DOKPLOY_RESOLVE_IP must be a canonical private IPv4 address"
              exit 1
            fi
          done
          if ! (( ip_a == 10 \
            || (ip_a == 172 && ip_b >= 16 && ip_b <= 31) \
            || (ip_a == 192 && ip_b == 168) )); then
            echo "::error::DOKPLOY_RESOLVE_IP must be an RFC 1918 private IPv4 address"
            exit 1
          fi
          printf 'DOKPLOY_CURL_RESOLVE=%s\n' \
            "${dokploy_host}:443:${DOKPLOY_RESOLVE_IP}" >> "$GITHUB_ENV"

      # Read the compose target once: prove it is the local-server compose we
      # manage, and capture the stack name plus the existing registry identity
      # so the compose update round-trips Dokploy's private-pull credentials.
      - name: Read the Dokploy compose target
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          set -euo pipefail
          umask 077
          response="$(mktemp)"
          trap 'rm -f "$response"' EXIT
          scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 20 \
            --retry 2 --retry-delay 2 --retry-max-time 30 \
            --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
            --resolve "$DOKPLOY_CURL_RESOLVE" -G -o "$response" \
            "${DOKPLOY_URL%/}/api/compose.one" \
            --data-urlencode "composeId=$COMPOSE_ID"
          if ! jq -e --arg id "$COMPOSE_ID" \
              '.composeId == $id and .serverId == null' "$response" >/dev/null; then
            echo "::error::Dokploy compose.one did not return the configured local compose target"
            exit 1
          fi
          target_stack="$(jq -er '.appName | select(type=="string" and length>0)' "$response")"
          if [[ ! "$target_stack" =~ ^[A-Za-z0-9][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "::error::Dokploy compose target returned an invalid Swarm stack name"
            exit 1
          fi
          existing_registry_id_json="$(jq -c '
            # Newer Dokploy releases removed registryId from the compose
            # schema. Normalize that omitted nullable field to null while
            # continuing to reject malformed values and preserve real IDs.
            if (has("registryId") | not) or .registryId == null then null
            elif (.registryId | type) == "string" and (.registryId | length) > 0 then
              .registryId
            else
              error("invalid registryId")
            end
          ' "$response")" \
            || { echo "::error::Dokploy compose target returned an invalid registry identity"; exit 1; }
          printf 'DOKPLOY_TARGET_STACK=%s\n' "$target_stack" >> "$GITHUB_ENV"
          printf 'DOKPLOY_EXISTING_REGISTRY_ID_JSON=%s\n' \
            "$existing_registry_id_json" >> "$GITHUB_ENV"

      # Prove this run's least-privilege package token can read the exact
      # private image before touching anything. The token stays in a temporary
      # Docker config and is never persisted over Dokploy's registry login.
      - name: Pre-pull images onto the swarm manager
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! command -v docker >/dev/null 2>&1; then
            echo "::error::docker CLI not present on runner (socket mount expected)"
            exit 1
          fi
          IMAGE="${IMAGE_NAME}@${IMAGE_DIGEST}"
          DOCKER_CONFIG="$(mktemp -d)"
          chmod 0700 "$DOCKER_CONFIG"
          export DOCKER_CONFIG
          trap 'docker logout ghcr.io >/dev/null 2>&1 || true; rm -rf "$DOCKER_CONFIG"' EXIT
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker pull "$IMAGE"
          docker image inspect "$IMAGE" --format 'pulled {{.Id}}'
          docker pull "$COLLABORA_IMAGE"
          docker image inspect "$COLLABORA_IMAGE" --format 'pulled Collabora {{.Id}}'

      # Forward-only schema migrations run before the redeploy. The unpooled
      # migrator login can SET ROLE to the NOLOGIN owner; neither credential
      # reaches the long-running deployment containers.
      - name: Run database migrations
        env:
          NODE_ENV: production
          MIGRATION_DATABASE_URL: ${{ secrets.DEV_MIGRATION_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          SUPERADMIN_DATABASE_URL: ${{ secrets.DEV_SUPERADMIN_DATABASE_URL }}
          DATABASE_OWNER_ROLE: beaconhs_owner
        run: pnpm --filter @beaconhs/db exec tsx src/migrate.ts

      # coolwsd caches browser assets at startup, so a changed branding file
      # needs a Collabora restart; an unchanged file needs nothing.
      - name: Install Collabora branding on the swarm manager
        run: |
          set -euo pipefail
          before="$(docker run --rm -v /etc/dokploy/beaconhs:/target alpine:3@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b \
            sh -c 'sha256sum /target/collabora-branding.js 2>/dev/null | cut -d" " -f1' || true)"
          docker run --rm -i -v /etc/dokploy/beaconhs:/target alpine:3@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b \
            sh -c 'cat > /target/collabora-branding.js && chmod 0644 /target/collabora-branding.js' \
            < deploy/collabora-branding.js
          after="$(sha256sum deploy/collabora-branding.js | cut -d' ' -f1)"
          echo "branding installed ($(wc -c < deploy/collabora-branding.js) bytes)"
          if [ "$before" != "$after" ]; then
            service="${DOKPLOY_TARGET_STACK}_collabora"
            if docker service inspect "$service" >/dev/null 2>&1; then
              echo "branding changed — restarting the current Collabora service"
              docker service update --force "$service" >/dev/null
            else
              echo "No existing Collabora service found; the new deployment will load the branding"
            fi
          else
            echo "branding unchanged — no restart needed"
          fi

      - name: Update the Dokploy compose environment
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          DEV_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          DEV_SUPERADMIN_DATABASE_URL: ${{ secrets.DEV_SUPERADMIN_DATABASE_URL }}
          REDIS_URL: ${{ secrets.DEV_REDIS_URL }}
          APP_URL: ${{ secrets.DEV_APP_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.DEV_BETTER_AUTH_SECRET }}
          ATTACHMENT_CAPABILITY_SECRET: ${{ secrets.DEV_ATTACHMENT_CAPABILITY_SECRET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PRIVATE_BUCKET_CONFIRMED: ${{ secrets.R2_PRIVATE_BUCKET_CONFIRMED }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          set -euo pipefail
          umask 077
          update_response="$(mktemp)"
          compose_state="$(mktemp)"
          env_block_file="$(mktemp)"
          trap 'rm -f "$update_response" "$compose_state" "$env_block_file"' EXIT
          IMAGE="${IMAGE_NAME}@${IMAGE_DIGEST}"
          COMPOSE_FILE="$(cat deploy/dokploy-dev.compose.yaml)"
          # Collabora is served same-origin on the app domain (Traefik path
          # routes), so both editor and WOPI-callback bases are APP_URL; the
          # server_name is the bare host for Collabora's generated URLs.
          APP_HOST="$(printf '%s' "$APP_URL" | sed -E 's~^https?://~~; s~/+$~~' | tr '[:upper:]' '[:lower:]')"
          {
            printf 'IMAGE=%s\n' "$IMAGE"
            printf 'APP_VERSION=%s\n' "$GITHUB_SHA"
            printf 'WRITER_REPLICAS=1\n'
            printf 'COLLABORA_IMAGE=%s\n' "$COLLABORA_IMAGE"
            printf 'COLLABORA_URL=%s\n' "$APP_URL"
            printf 'COLLABORA_WOPI_URL=%s\n' "$APP_URL"
            printf 'COLLABORA_SERVER_NAME=%s\n' "$APP_HOST"
            printf 'DATABASE_URL=%s\n' "$DEV_DATABASE_URL"
            printf 'SUPERADMIN_DATABASE_URL=%s\n' "$DEV_SUPERADMIN_DATABASE_URL"
            printf 'REDIS_URL=%s\n' "$REDIS_URL"
            printf 'APP_URL=%s\n' "$APP_URL"
            printf 'BETTER_AUTH_SECRET=%s\n' "$BETTER_AUTH_SECRET"
            printf 'ATTACHMENT_CAPABILITY_SECRET=%s\n' "$ATTACHMENT_CAPABILITY_SECRET"
            printf 'R2_ENDPOINT=%s\n' "$R2_ENDPOINT"
            printf 'R2_ACCESS_KEY_ID=%s\n' "$R2_ACCESS_KEY_ID"
            printf 'R2_SECRET_ACCESS_KEY=%s\n' "$R2_SECRET_ACCESS_KEY"
            printf 'R2_BUCKET=%s\n' "$R2_BUCKET"
            printf 'R2_PRIVATE_BUCKET_CONFIRMED=%s\n' "$R2_PRIVATE_BUCKET_CONFIRMED"
            printf 'VAPID_PUBLIC_KEY=%s\n' "$VAPID_PUBLIC_KEY"
            printf 'VAPID_PRIVATE_KEY=%s\n' "$VAPID_PRIVATE_KEY"
            printf 'VAPID_SUBJECT=%s\n' "$VAPID_SUBJECT"
            printf 'SENTRY_DSN=%s\n' "$SENTRY_DSN"
          } > "$env_block_file"
          jq -n --arg id "$COMPOSE_ID" --arg cf "$COMPOSE_FILE" \
            --argjson registry "$DOKPLOY_EXISTING_REGISTRY_ID_JSON" \
            --rawfile env "$env_block_file" \
            '{composeId:$id, sourceType:"raw", composeType:"stack",
              composeFile:$cf, env:$env, command:"", autoDeploy:false,
              randomize:false, isolatedDeployment:false,
              isolatedDeploymentsVolume:false, suffix:"",
              composePath:"./docker-compose.yml", registryId:$registry}' \
            | scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 30 \
                --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
                --resolve "$DOKPLOY_CURL_RESOLVE" -o "$update_response" \
                -X POST "${DOKPLOY_URL%/}/api/compose.update" \
                -H "content-type: application/json" --data @-
          # Re-read and prove the persisted compose matches what we sent — a
          # 2xx acknowledgement alone has been observed to be ambiguous.
          scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 20 \
            --retry 2 --retry-delay 2 --retry-max-time 30 \
            --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" --resolve "$DOKPLOY_CURL_RESOLVE" \
            -G -o "$compose_state" "${DOKPLOY_URL%/}/api/compose.one" \
            --data-urlencode "composeId=$COMPOSE_ID"
          if ! jq -e --arg cid "$COMPOSE_ID" --arg cf "$COMPOSE_FILE" \
              --rawfile env "$env_block_file" '
                .composeId==$cid and .serverId==null
                  and .composeFile==$cf and .env==$env
                  and .composeType=="stack" and .sourceType=="raw"
                  and .autoDeploy==false' "$compose_state" >/dev/null; then
            echo "::error::Dokploy compose/environment postcondition failed after the update"
            exit 1
          fi
          echo "Updated Dokploy compose environment for $IMAGE"

      - name: Deploy the compose on Dokploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          set -euo pipefail
          jq -n --arg id "$COMPOSE_ID" '{composeId:$id}' \
            | scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 60 \
                --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
                --resolve "$DOKPLOY_CURL_RESOLVE" \
                -X POST "${DOKPLOY_URL%/}/api/compose.deploy" \
                -H "content-type: application/json" --data @- >/dev/null
          echo "Dokploy compose deployment requested"

      - name: Wait for external readiness
        env:
          APP_URL: ${{ secrets.DEV_APP_URL }}
        run: |
          set -euo pipefail
          ready_url="${APP_URL%/}/api/health/ready"
          login_url="${APP_URL%/}/login"
          deadline=$((SECONDS + 600))
          last_login_status="not checked"
          while [ "$SECONDS" -lt "$deadline" ]; do
            body="$(curl -fsS --connect-timeout 5 --max-time 15 "$ready_url" 2>/dev/null || true)"
            if [ -n "$body" ] \
              && jq -e --arg sha "$GITHUB_SHA" \
                  '.status=="ready" and .version==$sha' <<< "$body" >/dev/null 2>&1; then
              last_login_status="$(curl -sS -o /dev/null -w '%{http_code}' \
                --connect-timeout 5 --max-time 15 "$login_url" || true)"
              if [ "$last_login_status" = 200 ]; then
                echo "Deployment is externally ready at commit $GITHUB_SHA"
                echo "Login page responds 200 — deployment healthy"
                exit 0
              fi
              echo "Readiness reports the new commit; /login returned HTTP ${last_login_status:-000}. Retrying."
            fi
            sleep 10
          done
          echo "::error::Deployment did not become externally ready with a healthy login page within 10 minutes (last /login status: ${last_login_status:-000})"
          exit 1
