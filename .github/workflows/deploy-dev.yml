name: Deploy (dev)

# Normal deployments are called after CI succeeds for the same main-branch
# commit. The explicit manual cutover operation reuses that complete path and
# adds the one-time data cutover while writers are drained. Images are built on
# GitHub-hosted runners; migration and deployment run on the Dokploy runner.
# All deployment-specific values live in repository secrets.

on:
  workflow_call:
    inputs:
      operation:
        description: Deployment operation requested by the calling workflow
        required: false
        type: string
        default: deploy
      ci_gate_completed:
        description: Set only by the CI caller after its gate job succeeds
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      operation:
        description: Maintenance operation to run directly
        required: true
        type: choice
        options:
          - rotate-compose-refresh-token

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/braedonsaunders/beaconhs
  COLLABORA_IMAGE: collabora/code:26.04.2.1.1@sha256:df33af88c59e26b7335ea98d91e65f1edf13f33369ce6115941b8d59d3409cb5

jobs:
  validate-operation:
    name: Validate deployment operation contract
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Reject unknown or incorrectly routed operations
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          OPERATION: ${{ inputs.operation }}
          CI_GATE_COMPLETED: ${{ inputs.ci_gate_completed }}
        run: |
          set -euo pipefail
          case "$OPERATION" in
            deploy)
              if [ "$EVENT_NAME" != push ] || [ "$REF" != refs/heads/main ] \
                || [ "$CI_GATE_COMPLETED" != true ]; then
                echo "::error::Normal dev deployment must be called by the main-branch push CI workflow"
                exit 1
              fi
              ;;
            deploy-and-cutover)
              if [ "$EVENT_NAME" != workflow_dispatch ] || [ "$REF" != refs/heads/main ] \
                || [ "$CI_GATE_COMPLETED" != true ]; then
                echo "::error::The audited data cutover must be called by the manually dispatched CI workflow"
                exit 1
              fi
              ;;
            rotate-compose-refresh-token)
              if [ "$EVENT_NAME" != workflow_dispatch ] || [ "$REF" != refs/heads/main ] \
                || [ "$CI_GATE_COMPLETED" = true ]; then
                echo "::error::Compose refresh-token rotation requires a direct manual dispatch"
                exit 1
              fi
              ;;
            *)
              echo "::error::Unsupported deployment operation"
              exit 1
              ;;
          esac
          echo "Deployment operation contract passed"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Reject stale main-branch workflow runs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: scripts/ci/require-current-main.sh

  rotate-compose-refresh-token:
    name: Rotate Dokploy compose refresh token
    needs: validate-operation
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'rotate-compose-refresh-token'
    permissions:
      contents: read
    runs-on: [self-hosted, dokploy]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Rotate and verify without logging either token
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_RESOLVE_IP: ${{ secrets.DOKPLOY_RESOLVE_IP }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          set -euo pipefail
          umask 077
          dokploy_host="${DOKPLOY_URL#https://}"
          if [ "$dokploy_host" = "$DOKPLOY_URL" ] \
            || [ "${#dokploy_host}" -gt 253 ] \
            || ! [[ "$dokploy_host" =~ ^([A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?\.)+[A-Za-z]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?$ ]]; then
            echo "::error::DOKPLOY_URL must be an HTTPS origin with a DNS hostname, no port, path, query, fragment, or trailing slash"
            exit 1
          fi
          if ! [[ "$DOKPLOY_RESOLVE_IP" =~ ^(0|[1-9][0-9]{0,2})\.(0|[1-9][0-9]{0,2})\.(0|[1-9][0-9]{0,2})\.(0|[1-9][0-9]{0,2})$ ]]; then
            echo "::error::DOKPLOY_RESOLVE_IP must be a canonical private IPv4 address"
            exit 1
          fi
          IFS=. read -r ip_a ip_b ip_c ip_d <<< "$DOKPLOY_RESOLVE_IP"
          for octet in "$ip_a" "$ip_b" "$ip_c" "$ip_d"; do
            if [ "$((10#$octet))" -gt 255 ]; then
              echo "::error::DOKPLOY_RESOLVE_IP must be a canonical private IPv4 address"
              exit 1
            fi
          done
          if ! (( ip_a == 10 \
            || (ip_a == 172 && ip_b >= 16 && ip_b <= 31) \
            || (ip_a == 192 && ip_b == 168) )); then
            echo "::error::DOKPLOY_RESOLVE_IP must be an RFC 1918 private IPv4 address"
            exit 1
          fi
          dokploy_curl_resolve="${dokploy_host}:443:${DOKPLOY_RESOLVE_IP}"
          before="$(mktemp)"
          after="$(mktemp)"
          trap 'rm -f "$before" "$after"' EXIT
          base="${DOKPLOY_URL%/}"

          scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 20 \
            --noproxy "$dokploy_host" --resolve "$dokploy_curl_resolve" \
            -G -o "$before" "$base/api/compose.one" \
            --data-urlencode "composeId=$COMPOSE_ID"
          old_token="$(jq -er '.refreshToken | select(type == "string" and length > 0)' "$before")"
          echo "::add-mask::$old_token"

          rotate_status="$(
            jq -n --arg id "$COMPOSE_ID" '{composeId:$id}' \
              | scripts/cluster/dokploy-curl.sh -sS --connect-timeout 5 --max-time 30 \
                  --noproxy "$dokploy_host" --resolve "$dokploy_curl_resolve" \
                  -o /dev/null -w "%{http_code}" \
                  -X POST "$base/api/compose.refreshToken" \
                  -H "content-type: application/json" --data @-
          )" || { echo "::error::Dokploy compose.refreshToken request failed"; exit 1; }
          if [ "$rotate_status" -lt 200 ] || [ "$rotate_status" -ge 300 ]; then
            echo "::error::Dokploy compose.refreshToken returned HTTP ${rotate_status}"
            exit 1
          fi

          scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 20 \
            --noproxy "$dokploy_host" --resolve "$dokploy_curl_resolve" \
            -G -o "$after" "$base/api/compose.one" \
            --data-urlencode "composeId=$COMPOSE_ID"
          new_token="$(jq -er '.refreshToken | select(type == "string" and length > 0)' "$after")"
          echo "::add-mask::$new_token"
          if [ "$old_token" = "$new_token" ]; then
            echo "::error::Dokploy returned the same compose refresh token"
            exit 1
          fi
          echo "Dokploy compose refresh token rotated and verified"

  preflight:
    name: Validate dev deployment contract
    needs: validate-operation
    if: inputs.operation == 'deploy' || inputs.operation == 'deploy-and-cutover'
    permissions: {}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DEV_APP_URL: ${{ secrets.DEV_APP_URL }}
      DEV_ATTACHMENT_CAPABILITY_SECRET: ${{ secrets.DEV_ATTACHMENT_CAPABILITY_SECRET }}
      DEV_BETTER_AUTH_SECRET: ${{ secrets.DEV_BETTER_AUTH_SECRET }}
      DEV_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
      DEV_MIGRATION_DATABASE_URL: ${{ secrets.DEV_MIGRATION_DATABASE_URL }}
      DEV_REDIS_URL: ${{ secrets.DEV_REDIS_URL }}
      DEV_SUPERADMIN_DATABASE_URL: ${{ secrets.DEV_SUPERADMIN_DATABASE_URL }}
      DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
      DOKPLOY_RESOLVE_IP: ${{ secrets.DOKPLOY_RESOLVE_IP }}
      DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
      DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_PRIVATE_BUCKET_CONFIRMED: ${{ secrets.R2_PRIVATE_BUCKET_CONFIRMED }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
      VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
    steps:
      - name: Require main for the one-time data cutover
        if: inputs.operation == 'deploy-and-cutover'
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF" != 'refs/heads/main' ]; then
            echo "::error::The one-time dev data cutover may run only from refs/heads/main"
            exit 1
          fi

      - name: Validate required names without printing values
        run: |
          set -euo pipefail
          required=(
            DEV_APP_URL DEV_ATTACHMENT_CAPABILITY_SECRET DEV_BETTER_AUTH_SECRET
            DEV_DATABASE_URL DEV_MIGRATION_DATABASE_URL DEV_REDIS_URL
            DEV_SUPERADMIN_DATABASE_URL DOKPLOY_COMPOSE_ID DOKPLOY_RESOLVE_IP
            DOKPLOY_TOKEN DOKPLOY_URL R2_ACCESS_KEY_ID
            R2_BUCKET R2_ENDPOINT
            R2_SECRET_ACCESS_KEY VAPID_PRIVATE_KEY VAPID_PUBLIC_KEY
            VAPID_SUBJECT
          )
          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then missing+=("$name"); fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            for name in "${missing[@]}"; do
              echo "::error::Required deployment secret ${name} is missing"
            done
            exit 1
          fi

          line_values=(
            DEV_APP_URL DEV_ATTACHMENT_CAPABILITY_SECRET DEV_BETTER_AUTH_SECRET
            DEV_DATABASE_URL DEV_MIGRATION_DATABASE_URL DEV_REDIS_URL
            DEV_SUPERADMIN_DATABASE_URL DOKPLOY_COMPOSE_ID DOKPLOY_RESOLVE_IP
            DOKPLOY_TOKEN DOKPLOY_URL
            R2_ACCESS_KEY_ID R2_BUCKET R2_ENDPOINT R2_PRIVATE_BUCKET_CONFIRMED
            R2_SECRET_ACCESS_KEY SENTRY_DSN VAPID_PRIVATE_KEY VAPID_PUBLIC_KEY
            VAPID_SUBJECT
          )
          for name in "${line_values[@]}"; do
            case "${!name:-}" in
              *$'\r'*|*$'\n'*)
                echo "::error::${name} must be a single-line value for the Dokploy environment"
                exit 1
                ;;
            esac
          done

          case "$R2_ENDPOINT" in
            *r2.cloudflarestorage.com*)
              if [ "$R2_PRIVATE_BUCKET_CONFIRMED" != true ]; then
                echo "::error::R2_PRIVATE_BUCKET_CONFIRMED must be exactly true after every R2 public development/custom domain has been disabled"
                exit 1
              fi
              ;;
          esac
          if [ "${#DEV_ATTACHMENT_CAPABILITY_SECRET}" -lt 32 ]; then
            echo "::error::DEV_ATTACHMENT_CAPABILITY_SECRET must contain at least 32 characters"
            exit 1
          fi
          if [ "${#DEV_BETTER_AUTH_SECRET}" -lt 32 ]; then
            echo "::error::DEV_BETTER_AUTH_SECRET must contain at least 32 characters"
            exit 1
          fi
          if [ "$DEV_DATABASE_URL" = "$DEV_MIGRATION_DATABASE_URL" ] \
            || [ "$DEV_DATABASE_URL" = "$DEV_SUPERADMIN_DATABASE_URL" ] \
            || [ "$DEV_MIGRATION_DATABASE_URL" = "$DEV_SUPERADMIN_DATABASE_URL" ]; then
            echo "::error::Runtime, migration, and cross-tenant database credentials must be distinct"
            exit 1
          fi
          if [ "$DEV_BETTER_AUTH_SECRET" = "$DEV_ATTACHMENT_CAPABILITY_SECRET" ]; then
            echo "::error::Authentication and attachment-capability secrets must be distinct"
            exit 1
          fi
          app_origin="${DEV_APP_URL%/}"
          app_host="${app_origin#https://}"
          if [ "$app_host" = "$app_origin" ] \
            || [ "${#app_host}" -gt 253 ] \
            || ! [[ "$app_host" =~ ^([A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?\.)+[A-Za-z]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?$ ]]; then
            echo "::error::DEV_APP_URL must be an HTTPS origin with a DNS hostname and no port, path, query, or fragment"
            exit 1
          fi
          dokploy_host="${DOKPLOY_URL#https://}"
          if [ "$dokploy_host" = "$DOKPLOY_URL" ] \
            || [ "${#dokploy_host}" -gt 253 ] \
            || ! [[ "$dokploy_host" =~ ^([A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?\.)+[A-Za-z]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?$ ]]; then
            echo "::error::DOKPLOY_URL must be an HTTPS origin with a DNS hostname, no port, path, query, fragment, or trailing slash"
            exit 1
          fi
          if ! [[ "$DOKPLOY_RESOLVE_IP" =~ ^(0|[1-9][0-9]{0,2})\.(0|[1-9][0-9]{0,2})\.(0|[1-9][0-9]{0,2})\.(0|[1-9][0-9]{0,2})$ ]]; then
            echo "::error::DOKPLOY_RESOLVE_IP must be a canonical private IPv4 address"
            exit 1
          fi
          IFS=. read -r ip_a ip_b ip_c ip_d <<< "$DOKPLOY_RESOLVE_IP"
          for octet in "$ip_a" "$ip_b" "$ip_c" "$ip_d"; do
            if [ "$((10#$octet))" -gt 255 ]; then
              echo "::error::DOKPLOY_RESOLVE_IP must be a canonical private IPv4 address"
              exit 1
            fi
          done
          if ! (( ip_a == 10 \
            || (ip_a == 172 && ip_b >= 16 && ip_b <= 31) \
            || (ip_a == 192 && ip_b == 168) )); then
            echo "::error::DOKPLOY_RESOLVE_IP must be an RFC 1918 private IPv4 address"
            exit 1
          fi
          case "$R2_ENDPOINT" in https://*) ;; *) echo "::error::R2_ENDPOINT must use HTTPS"; exit 1 ;; esac
          for name in DEV_DATABASE_URL DEV_MIGRATION_DATABASE_URL DEV_SUPERADMIN_DATABASE_URL; do
            case "${!name}" in
              postgres://*|postgresql://*) ;;
              *) echo "::error::${name} must be a PostgreSQL URL"; exit 1 ;;
            esac
          done
          node --input-type=module <<'NODE'
          const names = [
            'DEV_DATABASE_URL',
            'DEV_MIGRATION_DATABASE_URL',
            'DEV_SUPERADMIN_DATABASE_URL',
          ]

          function decode(value, label) {
            try {
              return decodeURIComponent(value)
            } catch {
              throw new Error(`${label} contains invalid percent encoding`)
            }
          }

          function identity(name, value) {
            let url
            try {
              url = new URL(value)
            } catch {
              throw new Error(`${name} is not a valid URL`)
            }
            if (url.protocol !== 'postgres:' && url.protocol !== 'postgresql:') {
              throw new Error(`${name} must be a PostgreSQL URL`)
            }
            const username = decode(url.username, `${name} username`)
            if (!username) throw new Error(`${name} must contain a database username`)

            const path = url.pathname.replace(/^\//u, '')
            if (!path) throw new Error(`${name} must contain an explicit database path`)
            const database = decode(path, `${name} database name`)
            for (const key of ['dbname', 'database']) {
              for (const queryDatabase of url.searchParams.getAll(key)) {
                if (queryDatabase && queryDatabase !== database) {
                  throw new Error(`${name} contains conflicting database names`)
                }
              }
            }
            return { username, database }
          }

          function validate(values) {
            const identities = names.map((name) => identity(name, values[name]))
            if (new Set(identities.map(({ username }) => username)).size !== names.length) {
              throw new Error(
                'Runtime, migration, and cross-tenant database URLs must use distinct database usernames',
              )
            }
            if (new Set(identities.map(({ database }) => database)).size !== 1) {
              throw new Error(
                'Runtime, migration, and cross-tenant database URLs must target the same database name',
              )
            }
          }

          try {
            validate(process.env)
          } catch (error) {
            console.error(`::error::${error instanceof Error ? error.message : 'Invalid database URL contract'}`)
            process.exit(1)
          }
          NODE
          case "$DEV_REDIS_URL" in
            redis://*|rediss://*) ;;
            *) echo "::error::DEV_REDIS_URL must be a Redis URL"; exit 1 ;;
          esac
          case "$VAPID_SUBJECT" in
            mailto:*|https://*) ;;
            *) echo "::error::VAPID_SUBJECT must use mailto: or HTTPS"; exit 1 ;;
          esac
          if [ -z "$SENTRY_DSN" ]; then
            echo "::warning::SENTRY_DSN is not configured; dev error monitoring will be inactive"
          fi
          echo "Deployment secret contract passed"

      - name: Validate deployment contract regression fixtures
        run: |
          set -euo pipefail
          jq -n -e '
            def one($env; $key; $value):
              ([$env[]? | select(startswith($key+"="))]
                == [$key+"="+$value]);
            def exact_keys($env; $keys):
              ([$env[]? | split("=")[0]] | sort)==($keys | sort);
            def exact_image($actual; $expected):
              $actual==$expected;
            def pinned_collabora($image):
              $image | test("^collabora/code:[A-Za-z0-9._-]+@sha256:[0-9a-f]{64}$");
            def local_compose($compose):
              $compose.serverId == null;
            def controlled_compose($compose):
              $compose.command == ""
                and $compose.autoDeploy == false
                and $compose.randomize == false
                and $compose.isolatedDeployment == false
                and $compose.isolatedDeploymentsVolume == false
                and $compose.suffix == ""
                and $compose.composePath == "./docker-compose.yml";
            ("a" * 64) as $digest
            | one(["APP_ROLE=web"]; "APP_ROLE"; "web")
            and (one(["APP_ROLE=web","APP_ROLE=worker"]; "APP_ROLE"; "web") | not)
            and (one(["APP_ROLE=web","APP_ROLE=web"]; "APP_ROLE"; "web") | not)
            and exact_keys(["APP_ROLE=web","NODE_ENV=production"];
              ["APP_ROLE","NODE_ENV"])
            and (exact_keys(["APP_ROLE=web","NODE_ENV=production","EXTRA=unsafe"];
              ["APP_ROLE","NODE_ENV"]) | not)
            and exact_image("ghcr.io/braedonsaunders/beaconhs@sha256:"+$digest;
              "ghcr.io/braedonsaunders/beaconhs@sha256:"+$digest)
            and (exact_image("ghcr.io/braedonsaunders/beaconhs:commit@sha256:"+$digest;
              "ghcr.io/braedonsaunders/beaconhs:commit") | not)
            and pinned_collabora("collabora/code:prior@sha256:"+$digest)
            and (pinned_collabora("collabora/code:prior") | not)
            and local_compose({serverId:null})
            and (local_compose({serverId:"remote-server"}) | not)
            and controlled_compose({command:"",autoDeploy:false,randomize:false,
              isolatedDeployment:false,isolatedDeploymentsVolume:false,suffix:"",
              composePath:"./docker-compose.yml"})
            and (controlled_compose({command:"compose up",autoDeploy:false,randomize:false,
              isolatedDeployment:false,isolatedDeploymentsVolume:false,suffix:"",
              composePath:"./docker-compose.yml"}) | not)
          ' >/dev/null
          echo "Deployment contract regression fixtures passed"

  build:
    if: inputs.operation == 'deploy' || inputs.operation == 'deploy-and-cutover'
    needs: preflight
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      image_digest: ${{ steps.build-image.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Recheck current main tip before publishing an image
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: scripts/ci/require-current-main.sh
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build-image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          build-args: |
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          # ignore-error: the GHA cache backend intermittently fails the blob
          # write ("error writing layer blob: not_found") AFTER the image is
          # already pushed — don't let a cache hiccup fail the build/deploy.
          cache-to: type=gha,mode=max,ignore-error=true

  deploy:
    if: inputs.operation == 'deploy' || inputs.operation == 'deploy-and-cutover'
    needs: build
    permissions:
      contents: read
      packages: read
    runs-on: [self-hosted, dokploy]
    timeout-minutes: 360
    env:
      IMAGE_DIGEST: ${{ needs.build.outputs.image_digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Validate immutable build output
        run: |
          set -euo pipefail
          if ! [[ "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::The image build did not return a canonical sha256 digest"
            exit 1
          fi
          echo "Deploying immutable image ${IMAGE_NAME}@${IMAGE_DIGEST}"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 24.18.0 }
      # Install Node first: the self-hosted runner's system Node is not a
      # supported application runtime, and pnpm's installer invokes npm.
      # package.json's packageManager field pins pnpm; passing a version here
      # too errors with "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - run: pnpm install --frozen-lockfile

      - name: Configure TLS-preserving Dokploy split-DNS resolution
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_RESOLVE_IP: ${{ secrets.DOKPLOY_RESOLVE_IP }}
        run: |
          set -euo pipefail
          dokploy_host="${DOKPLOY_URL#https://}"
          if [ "$dokploy_host" = "$DOKPLOY_URL" ] \
            || [ "${#dokploy_host}" -gt 253 ] \
            || ! [[ "$dokploy_host" =~ ^([A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?\.)+[A-Za-z]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?$ ]]; then
            echo "::error::DOKPLOY_URL must be an HTTPS origin with a DNS hostname, no port, path, query, fragment, or trailing slash"
            exit 1
          fi
          if ! [[ "$DOKPLOY_RESOLVE_IP" =~ ^(0|[1-9][0-9]{0,2})\.(0|[1-9][0-9]{0,2})\.(0|[1-9][0-9]{0,2})\.(0|[1-9][0-9]{0,2})$ ]]; then
            echo "::error::DOKPLOY_RESOLVE_IP must be a canonical private IPv4 address"
            exit 1
          fi
          IFS=. read -r ip_a ip_b ip_c ip_d <<< "$DOKPLOY_RESOLVE_IP"
          for octet in "$ip_a" "$ip_b" "$ip_c" "$ip_d"; do
            if [ "$((10#$octet))" -gt 255 ]; then
              echo "::error::DOKPLOY_RESOLVE_IP must be a canonical private IPv4 address"
              exit 1
            fi
          done
          if ! (( ip_a == 10 \
            || (ip_a == 172 && ip_b >= 16 && ip_b <= 31) \
            || (ip_a == 192 && ip_b == 168) )); then
            echo "::error::DOKPLOY_RESOLVE_IP must be an RFC 1918 private IPv4 address"
            exit 1
          fi
          printf 'DOKPLOY_CURL_RESOLVE=%s\n' \
            "${dokploy_host}:443:${DOKPLOY_RESOLVE_IP}" >> "$GITHUB_ENV"

      - name: Verify database-managed platform email before downtime
        env:
          NODE_ENV: production
          SUPERADMIN_DATABASE_URL: ${{ secrets.DEV_SUPERADMIN_DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.DEV_BETTER_AUTH_SECRET }}
        run: pnpm --filter @beaconhs/worker email-config:check

      - name: Verify Dokploy control-plane target before downtime
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          set -euo pipefail
          umask 077
          if ! command -v docker >/dev/null 2>&1; then
            echo "::error::docker CLI not present on runner (socket mount expected)"
            exit 1
          fi
          manager_arch="$(docker info --format '{{.Architecture}}')"
          case "$manager_arch" in
            x86_64|amd64) ;;
            *)
              echo "::error::Dokploy manager architecture is unsupported; BeaconHS requires linux/amd64 for the pinned Chrome and Collabora runtimes"
              exit 1
              ;;
          esac
          response="$(mktemp)"
          trap 'rm -f "$response"' EXIT
          scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 20 \
            --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
            --resolve "$DOKPLOY_CURL_RESOLVE" -G -o "$response" \
            "${DOKPLOY_URL%/}/api/compose.one" \
            --data-urlencode "composeId=$COMPOSE_ID"
          if ! jq -e --arg id "$COMPOSE_ID" \
              '.composeId == $id and .serverId == null' "$response" >/dev/null; then
            echo "::error::Dokploy compose.one did not return the configured local compose target"
            exit 1
          fi
          target_stack="$(jq -er '.appName | select(type=="string" and length>0)' "$response")"
          if [[ ! "$target_stack" =~ ^[A-Za-z0-9][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "::error::Dokploy compose target returned an invalid Swarm stack name"
            exit 1
          fi
          existing_registry_id_json="$(jq -ce '
            if (has("registryId") | not) then error("missing registryId")
            elif .registryId == null then null
            elif (.registryId | type) == "string" and (.registryId | length) > 0 then
              .registryId
            else
              error("invalid registryId")
            end
          ' "$response")" \
            || { echo "::error::Dokploy compose target returned an invalid registry identity"; exit 1; }
          printf 'DOKPLOY_TARGET_STACK=%s\n' "$target_stack" >> "$GITHUB_ENV"
          printf 'DOKPLOY_EXISTING_REGISTRY_ID_JSON=%s\n' \
            "$existing_registry_id_json" >> "$GITHUB_ENV"
          scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 20 \
            --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
            --resolve "$DOKPLOY_CURL_RESOLVE" -G -o "$response" \
            "${DOKPLOY_URL%/}/api/deployment.allByCompose" \
            --data-urlencode "composeId=$COMPOSE_ID"
          if ! jq -e 'type == "array"' "$response" >/dev/null; then
            echo "::error::Dokploy deployment.allByCompose did not return a deployment array"
            exit 1
          fi
          scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 20 \
            --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
            --resolve "$DOKPLOY_CURL_RESOLVE" -o "$response" \
            "${DOKPLOY_URL%/}/api/deployment.queueList"
          if ! jq -e 'type == "array"' "$response" >/dev/null; then
            echo "::error::Dokploy deployment.queueList did not return a queue array"
            exit 1
          fi
          echo "Dokploy credentials, compose target, existing registry identity, deployment ledger, and queue verified"

      - name: Recheck current main tip before mutating the deployment host
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: scripts/ci/require-current-main.sh

      # Prove this run's least-privilege package token can read the exact private
      # image before taking writers down. The token stays in a temporary Docker
      # config and is never persisted over Dokploy's existing registry login.
      - name: Pre-pull image onto swarm manager
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! command -v docker >/dev/null 2>&1; then
            echo "::error::docker CLI not present on runner (socket mount expected)"; exit 1
          fi
          IMAGE="${IMAGE_NAME}@${IMAGE_DIGEST}"
          DOCKER_CONFIG="$(mktemp -d)"
          chmod 0700 "$DOCKER_CONFIG"
          export DOCKER_CONFIG
          trap 'docker logout ghcr.io >/dev/null 2>&1 || true; rm -rf "$DOCKER_CONFIG"' EXIT
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker pull "$IMAGE"
          docker image inspect "$IMAGE" --format 'pulled {{.Id}}'
          docker pull "$COLLABORA_IMAGE"
          docker image inspect "$COLLABORA_IMAGE" --format 'pulled Collabora {{.Id}}'

      # Prepare the host bind mount before database downtime. coolwsd caches
      # browser assets at startup, so a changed file also restarts the current
      # Collabora service while the existing app is still fully available.
      - name: Install Collabora branding on the swarm manager
        run: |
          set -euo pipefail
          before="$(docker run --rm -v /etc/dokploy/beaconhs:/target alpine:3@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b \
            sh -c 'sha256sum /target/collabora-branding.js 2>/dev/null | cut -d" " -f1' || true)"
          docker run --rm -i -v /etc/dokploy/beaconhs:/target alpine:3@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b \
            sh -c 'cat > /target/collabora-branding.js && chmod 0644 /target/collabora-branding.js' \
            < deploy/collabora-branding.js
          after="$(sha256sum deploy/collabora-branding.js | cut -d' ' -f1)"
          echo "branding installed ($(wc -c < deploy/collabora-branding.js) bytes)"
          if [ "$before" != "$after" ]; then
            stack_services="$(scripts/cluster/read-stack-services.sh "$DOKPLOY_TARGET_STACK")"
            services="$(echo "$stack_services" | jq -c \
              '[.[] | select(.Spec.Name | endswith("_collabora")) | {id:.ID,name:.Spec.Name}]')"
            count="$(echo "$services" | jq 'length')"
            if [ "$count" -gt 1 ]; then
              echo "::error::multiple Collabora services found in the target stack; refusing an ambiguous restart"
              exit 1
            fi
            if [ "$count" -eq 1 ]; then
              service="$(echo "$services" | jq -er '.[0].name')"
              echo "branding changed — restarting the current Collabora service"
              docker service update --force "$service" >/dev/null
            else
              echo "No existing target-stack Collabora service found; the new deployment will load the branding"
            fi
          else
            echo "branding unchanged — no restart needed"
          fi

      # Dokploy stores compose-domain metadata without changing live Traefik
      # labels until compose.deploy. Reconcile it while the current app and
      # database writers are still available, then deploy exactly once after
      # the schema/data cutover and compose environment update.
      - name: Reconcile Collabora route metadata before downtime
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          APP_URL: ${{ secrets.DEV_APP_URL }}
        run: |
          set -euo pipefail
          umask 077
          host="$(printf '%s' "$APP_URL" | sed -E 's~^https?://~~; s~/+$~~' | tr '[:upper:]' '[:lower:]')"
          targets='["/browser","/cool","/hosting"]'

          dokploy_get() {
            scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 20 \
              --retry 2 --retry-delay 2 --retry-all-errors --retry-max-time 30 \
              --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
              --resolve "$DOKPLOY_CURL_RESOLVE" "$@"
          }

          read_domains() {
            dokploy_get -G "${DOKPLOY_URL%/}/api/domain.byComposeId" \
              --data-urlencode "composeId=$COMPOSE_ID"
          }

          read_swarm_routes() {
            local service_list
            local -a service_ids
            service_list="$(docker service ls -q)" || return 1
            if [ -z "$service_list" ]; then
              printf '%s\n' '{"unsupported":[],"routes":[]}'
              return 0
            fi
            mapfile -t service_ids <<< "$service_list"
            docker service inspect "${service_ids[@]}" \
              | jq -c -f scripts/cluster/traefik-routes.jq
          }

          compose_state="$(dokploy_get -G "${DOKPLOY_URL%/}/api/compose.one" \
            --data-urlencode "composeId=$COMPOSE_ID")" \
            || { echo "::error::compose.one failed during route audit"; exit 1; }
          target_stack="$(echo "$compose_state" | jq -er \
            '.appName | select(type=="string" and length>0)')"
          if ! echo "$compose_state" | jq -e '.serverId == null' >/dev/null; then
            echo "::error::The Dokploy compose target moved to a remote server"
            exit 1
          fi
          if [ "$target_stack" != "$DOKPLOY_TARGET_STACK" ]; then
            echo "::error::Dokploy target stack identity changed during pre-downtime validation"
            exit 1
          fi

          swarm_route_state="$(read_swarm_routes)" \
            || { echo "::error::Unable to inspect global Docker Swarm routes"; exit 1; }
          unsupported_routes="$(echo "$swarm_route_state" | jq -c --arg h "$host" '
            [.unsupported[]
              | select((.reason | contains("host"))
                  or .reason=="unsupported-boolean-expression"
                  or any(.hosts[]?; .==$h))
              | {serviceId,serviceName,stack,router,reason}]')"
          if [ "$(echo "$unsupported_routes" | jq 'length')" -ne 0 ]; then
            echo "$unsupported_routes" | jq -c '.[]' | while IFS= read -r unsupported; do
              echo "::error::An app-host-relevant Traefik router uses a matcher that cannot be audited safely: ${unsupported}"
            done
            exit 1
          fi
          swarm_routes="$(echo "$swarm_route_state" | jq -c '.routes')"
          target_stack_live=false
          target_stack_services="$(scripts/cluster/read-stack-services.sh "$target_stack")"
          if [ "$(echo "$target_stack_services" | jq 'length')" -ne 0 ]; then
            target_stack_live=true
          fi
          if [ "$target_stack_live" = true ] \
            && ! echo "$swarm_routes" | jq -e --arg h "$host" --arg stack "$target_stack" \
              'any(.[]; .host==$h and .stack==$stack and .path=="/"
                and .pathKind=="prefix")' >/dev/null; then
            echo "::error::The live target stack does not own the expected primary app-host route"
            exit 1
          fi
          swarm_conflicts="$(echo "$swarm_routes" | jq -c --arg h "$host" \
            --arg stack "$target_stack" --argjson targets "$targets" '
              [.[] | . as $route
                | select($route.host==$h)
                | select($route.path=="/" or any($targets[]; . as $target
                    | ($route.path | startswith($target))
                      or ($target | startswith($route.path))))
                | select(($route.stack==$stack and $route.pathKind=="prefix"
                    and ($route.path=="/" or ($targets | index($route.path))!=null)) | not)
                | {serviceId,serviceName,stack,router,path}]')"
          if [ "$(echo "$swarm_conflicts" | jq 'length')" -ne 0 ]; then
            echo "$swarm_conflicts" | jq -c '.[]' | while IFS= read -r conflict; do
              echo "::error::Competing live Swarm route requires operator review: ${conflict}"
            done
            exit 1
          fi
          swarm_route_set_sha256="$(echo "$swarm_routes" \
            | jq -cS --arg h "$host" '[.[] | select(.host==$h)]' \
            | sha256sum | awk '{print $1}')"
          if ! [[ "$swarm_route_set_sha256" =~ ^[a-f0-9]{64}$ ]]; then
            echo "::error::Failed to fingerprint the live app-host Swarm route set"
            exit 1
          fi

          existing="$(read_domains)" \
            || { echo "::error::domain.byComposeId failed"; exit 1; }
          if ! echo "$existing" | jq -e 'type=="array"' >/dev/null 2>&1; then
            response_type="$(echo "$existing" | jq -r 'type' 2>/dev/null || echo invalid-json)"
            echo "::error::unexpected domain list response type: ${response_type}"
            exit 1
          fi

          conflicts="$(echo "$existing" | jq -c --arg h "$host" --argjson targets "$targets" '
            [.[]
              | select((.host | ascii_downcase) == $h)
              | (.path // "/") as $candidate
              | select($candidate != "/")
              | select(($targets | index($candidate)) == null)
              | select(any($targets[]; . as $prefix
                  | ($candidate | startswith($prefix))
                    or ($prefix | startswith($candidate))))
              | {domainId, path, serviceName}]')"
          if [ "$(echo "$conflicts" | jq 'length')" -ne 0 ]; then
            echo "$conflicts" | jq -c '.[]' | while IFS= read -r conflict; do
              echo "::error::Overlapping Dokploy path route requires operator review: ${conflict}"
            done
            exit 1
          fi

          primary_routes="$(echo "$existing" | jq -c --arg h "$host" \
            '[.[] | select((.host | ascii_downcase)==$h and ((.path // "/") == "/"))]')"
          if [ "$(echo "$primary_routes" | jq 'length')" -ne 1 ]; then
            echo "::error::Expected one primary Dokploy domain for the configured app host"
            exit 1
          fi
          webdom="$(echo "$primary_routes" | jq -c '.[0]')"
          if ! echo "$webdom" | jq -e --arg cid "$COMPOSE_ID" \
              '.composeId==$cid and .domainType=="compose" and .https==true
                and .serviceName=="web" and .port==3000
                and (.certificateType=="letsencrypt" or .certificateType=="none"
                  or .certificateType=="custom")
                and (.certificateType!="custom"
                  or ((.customCertResolver // "") | length)>0)
                and .customEntrypoint==null
                and ((.internalPath // "/")=="/")
                and ((.stripPath // false)==false)
                and ((.middlewares // [])==[])
                and ((.forwardAuthEnabled // false)==false)' >/dev/null; then
            echo "::error::Primary Dokploy domain is not the configured compose TLS route"
            exit 1
          fi
          https="$(echo "$webdom" | jq -r '.https')"
          cert="$(echo "$webdom" | jq -r '.certificateType')"
          resolver="$(echo "$webdom" | jq -r '.customCertResolver // ""')"

          for path in /browser /cool /hosting; do
            matches="$(echo "$existing" | jq -c --arg h "$host" --arg p "$path" \
              '[.[] | select((.host | ascii_downcase)==$h and .path==$p)]')"
            count="$(echo "$matches" | jq 'length')"
            if [ "$count" -gt 1 ]; then
              echo "::error::Multiple Dokploy routes exist for ${path}; refusing an ambiguous repair"
              exit 1
            fi
            if [ "$count" -eq 1 ]; then
              route="$(echo "$matches" | jq -c '.[0]')"
              if echo "$route" | jq -e --arg cid "$COMPOSE_ID" --arg h "$host" \
                  --argjson tls "$https" --arg cert "$cert" --arg resolver "$resolver" \
                  '(.host | ascii_downcase)==$h and .composeId==$cid
                    and .domainType=="compose" and .serviceName=="collabora"
                    and .port==9980 and .https==$tls and .certificateType==$cert
                    and ((.customCertResolver // "") == $resolver)
                    and .customEntrypoint == null
                    and ((.internalPath // "/") == "/") and ((.stripPath // false) == false)
                    and ((.middlewares // []) == [])
                    and ((.forwardAuthEnabled // false) == false)' >/dev/null; then
                echo "verified route $path -> collabora:9980"
                continue
              fi
              domain_id="$(echo "$route" | jq -er '.domainId | select(type=="string" and length>0)')"
              status="$(jq -n --arg id "$domain_id" --arg h "$host" --arg p "$path" \
                  --argjson tls "$https" --arg cert "$cert" --arg resolver "$resolver" \
                  '{domainId:$id, host:$h, path:$p, port:9980, https:$tls,
                    certificateType:$cert,
                    customCertResolver:(if $resolver=="" then null else $resolver end),
                    customEntrypoint:null,
                    serviceName:"collabora", domainType:"compose", internalPath:"/",
                    stripPath:false, middlewares:[], forwardAuthEnabled:false}' \
                | scripts/cluster/dokploy-curl.sh -sS --connect-timeout 5 --max-time 30 \
                    --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
                    --resolve "$DOKPLOY_CURL_RESOLVE" -o /dev/null -w "%{http_code}" \
                    -X POST "$DOKPLOY_URL/api/domain.update" \
                    -H "content-type: application/json" --data @-)"
              if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
                echo "::error::domain.update $path returned HTTP $status"
                exit 1
              fi
              echo "reconciled route $path -> collabora:9980"
              continue
            fi
            status="$(jq -n --arg cid "$COMPOSE_ID" --arg h "$host" --arg p "$path" \
                --argjson tls "$https" --arg cert "$cert" --arg resolver "$resolver" \
                '{composeId:$cid, host:$h, path:$p, port:9980, https:$tls,
                  certificateType:$cert,
                  customCertResolver:(if $resolver=="" then null else $resolver end),
                  customEntrypoint:null,
                  serviceName:"collabora", domainType:"compose", internalPath:"/",
                  stripPath:false, middlewares:[], forwardAuthEnabled:false}' \
              | scripts/cluster/dokploy-curl.sh -sS --connect-timeout 5 --max-time 30 \
                  --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
                  --resolve "$DOKPLOY_CURL_RESOLVE" -o /dev/null -w "%{http_code}" \
                  -X POST "$DOKPLOY_URL/api/domain.create" \
                  -H "content-type: application/json" --data @-)"
            if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
              echo "created route $path -> collabora:9980"
            else
              echo "::error::domain.create $path returned HTTP $status"
              exit 1
            fi
          done

          verified="$(read_domains)" \
            || { echo "::error::domain.byComposeId verification failed"; exit 1; }
          if ! echo "$verified" | jq -e --arg h "$host" --arg cid "$COMPOSE_ID" \
              --argjson tls "$https" --arg cert "$cert" --arg resolver "$resolver" \
              --argjson targets "$targets" '
                type=="array"
                and (. as $domains
                  | ($domains | length)==4
                  and ([$domains[]
                      | select((.host | ascii_downcase)==$h
                        and ((.path // "/")=="/"))] | length==1)
                  and ([$domains[]
                      | select((.host | ascii_downcase)==$h
                        and ((.path // "/")=="/")
                        and .composeId==$cid and .domainType=="compose"
                        and .serviceName=="web" and .port==3000
                        and .https==$tls and .certificateType==$cert
                        and ((.customCertResolver // "")==$resolver)
                        and .customEntrypoint==null
                        and ((.internalPath // "/")=="/")
                        and ((.stripPath // false)==false)
                        and ((.middlewares // [])==[])
                        and ((.forwardAuthEnabled // false)==false))]
                    | length==1)
                  and ([$domains[]
                      | select((.host | ascii_downcase)==$h)
                      | (.path // "/") as $candidate
                      | select($candidate != "/")
                      | select(($targets | index($candidate)) == null)
                      | select(any($targets[]; . as $prefix
                        | ($candidate | startswith($prefix))
                          or ($prefix | startswith($candidate))))]
                    | length==0)
                  and (all($targets[]; . as $path
                    | ([$domains[]
                        | select((.host | ascii_downcase)==$h and .path==$path
                          and .composeId==$cid and .domainType=="compose"
                          and .serviceName=="collabora" and .port==9980
                          and .https==$tls and .certificateType==$cert
                          and ((.customCertResolver // "") == $resolver)
                          and .customEntrypoint == null
                          and ((.internalPath // "/") == "/")
                          and ((.stripPath // false) == false)
                          and ((.middlewares // []) == [])
                          and ((.forwardAuthEnabled // false) == false))]
                      | length==1))))' >/dev/null; then
            echo "::error::Dokploy exact four-route compose-domain postcondition failed"
            exit 1
          fi
          domain_set_sha256="$(echo "$verified" \
            | jq -cS 'map(del(.compose) | .host |= ascii_downcase) | sort_by(.domainId)' \
            | sha256sum | awk '{print $1}')"
          if ! [[ "$domain_set_sha256" =~ ^[a-f0-9]{64}$ ]]; then
            echo "::error::Failed to fingerprint the verified Dokploy domain set"
            exit 1
          fi
          {
            printf 'DOKPLOY_DOMAIN_SET_SHA256=%s\n' "$domain_set_sha256"
            printf 'DOKPLOY_SWARM_ROUTE_SET_SHA256=%s\n' "$swarm_route_set_sha256"
            printf 'DOKPLOY_TARGET_STACK_WAS_LIVE=%s\n' "$target_stack_live"
            printf 'DOKPLOY_TARGET_STACK=%s\n' "$target_stack"
          } >> "$GITHUB_ENV"
          echo "Dokploy Collabora route metadata reconciled and verified before downtime"

      # Persist a zero-writer compose before touching the database. Dokploy
      # deployment jobs resolve compose metadata when they run, so even a
      # concurrent UI/API deploy can only materialize zero application writers.
      - name: Recheck current main tip immediately before downtime
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: scripts/ci/require-current-main.sh

      - name: Reject unsupported topology or outside writers before downtime
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          MIGRATION_DATABASE_URL: ${{ secrets.DEV_MIGRATION_DATABASE_URL }}
          SUPERADMIN_DATABASE_URL: ${{ secrets.DEV_SUPERADMIN_DATABASE_URL }}
        run: |
          set -euo pipefail
          scripts/cluster/assert-cutover-isolation.sh
          echo "Pre-downtime Swarm topology and database-writer isolation verified"

      - name: Fence Dokploy writer metadata before downtime
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          set -euo pipefail
          umask 077
          compose_state="$(mktemp)"
          response="$(mktemp)"
          deployments="$(mktemp)"
          queue="$(mktemp)"
          fenced_env_file="$(mktemp)"
          trap 'rm -f "$compose_state" "$response" "$deployments" "$queue" "$fenced_env_file"' EXIT

          if [ -z "${DOKPLOY_EXISTING_REGISTRY_ID_JSON:-}" ]; then
            echo "::error::The pre-downtime Dokploy registry identity proof is missing"
            exit 1
          fi

          dokploy_get() {
            scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 20 \
              --retry 2 --retry-delay 2 --retry-all-errors --retry-max-time 30 \
              --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
              --resolve "$DOKPLOY_CURL_RESOLVE" "$@"
          }

          dokploy_get -G -o "$compose_state" "${DOKPLOY_URL%/}/api/compose.one" \
            --data-urlencode "composeId=$COMPOSE_ID"
          if ! jq -e --arg cid "$COMPOSE_ID" --arg stack "$DOKPLOY_TARGET_STACK" \
              --argjson registry "$DOKPLOY_EXISTING_REGISTRY_ID_JSON" \
              '.composeId==$cid and .serverId==null and .appName==$stack
                and .registryId==$registry and (.env | type)=="string"' \
              "$compose_state" >/dev/null; then
            echo "::error::compose.one did not return the target compose environment with its original registry identity"
            exit 1
          fi
          current_env="$(jq -r '.env' "$compose_state")"
          controlled_setting_count="$(printf '%s\n' "$current_env" \
            | awk -F= '/^(WRITER_REPLICAS|COLLABORA_IMAGE|IMAGE|APP_VERSION)=/ { count[$1]++ }
                END { for (key in count) if (count[key] > 1) duplicates++; print duplicates + 0 }')"
          if [ "$controlled_setting_count" -ne 0 ]; then
            echo "::error::Dokploy compose environment contains duplicate workflow-controlled settings"
            exit 1
          fi
          fenced_env="$({
            printf '%s\n' "$current_env" \
              | awk '!/^(WRITER_REPLICAS|COLLABORA_IMAGE|IMAGE|APP_VERSION)=/'
            printf 'IMAGE=%s@%s\n' "$IMAGE_NAME" "$IMAGE_DIGEST"
            printf 'APP_VERSION=%s\n' "$GITHUB_SHA"
            printf '%s\n' 'WRITER_REPLICAS=0'
            printf 'COLLABORA_IMAGE=%s\n' "$COLLABORA_IMAGE"
          })"
          printf '%s' "$fenced_env" > "$fenced_env_file"
          compose_file="$(cat deploy/dokploy-dev.compose.yaml)"

          echo 'BEACONHS_DOKPLOY_WRITER_FENCE_UPDATE_STARTED=true' >> "$GITHUB_ENV"
          update_curl_rc=0
          update_status="$(jq -n --arg cid "$COMPOSE_ID" --arg cf "$compose_file" \
              --argjson registry "$DOKPLOY_EXISTING_REGISTRY_ID_JSON" \
              --rawfile env "$fenced_env_file" \
              '{composeId:$cid, sourceType:"raw", composeType:"stack",
                composeFile:$cf, env:$env, command:"", autoDeploy:false,
                randomize:false, isolatedDeployment:false,
                isolatedDeploymentsVolume:false, suffix:"",
                composePath:"./docker-compose.yml", registryId:$registry}' \
            | scripts/cluster/dokploy-curl.sh -sS --connect-timeout 5 --max-time 30 \
                --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
                --resolve "$DOKPLOY_CURL_RESOLVE" -o "$response" -w '%{http_code}' \
                -X POST "${DOKPLOY_URL%/}/api/compose.update" \
                -H 'content-type: application/json' --data @-)" \
            || update_curl_rc=$?
          update_acknowledged=false
          if [ "$update_curl_rc" -eq 0 ] \
            && [[ "$update_status" =~ ^2[0-9][0-9]$ ]] \
            && jq -e --arg cid "$COMPOSE_ID" '.composeId==$cid' "$response" >/dev/null 2>&1; then
            update_acknowledged=true
          fi

          dokploy_get -G -o "$compose_state" "${DOKPLOY_URL%/}/api/compose.one" \
            --data-urlencode "composeId=$COMPOSE_ID"
          if ! jq -e --arg cid "$COMPOSE_ID" --arg cf "$compose_file" \
              --arg stack "$DOKPLOY_TARGET_STACK" \
              --arg image "${IMAGE_NAME}@${IMAGE_DIGEST}" --arg sha "$GITHUB_SHA" \
              --arg collabora "$COLLABORA_IMAGE" \
              --argjson registry "$DOKPLOY_EXISTING_REGISTRY_ID_JSON" '
              .composeId==$cid and .serverId==null and .appName==$stack
                and .registryId==$registry
                and .composeFile==$cf
                and .sourceType=="raw" and .composeType=="stack"
                and .command=="" and .autoDeploy==false
                and .randomize==false and .isolatedDeployment==false
                and .isolatedDeploymentsVolume==false and .suffix==""
                and .composePath=="./docker-compose.yml"
                and ([.env | split("\n")[] | select(startswith("IMAGE="))]
                  == ["IMAGE="+$image])
                and ([.env | split("\n")[] | select(startswith("APP_VERSION="))]
                  == ["APP_VERSION="+$sha])
                and ([.env | split("\n")[] | select(startswith("WRITER_REPLICAS="))]
                  == ["WRITER_REPLICAS=0"])
                and ([.env | split("\n")[] | select(startswith("COLLABORA_IMAGE="))]
                  == ["COLLABORA_IMAGE="+$collabora])' "$compose_state" >/dev/null; then
            echo "::error::Dokploy writer-fence postcondition failed after the single update attempt (acknowledged=${update_acknowledged}, HTTP ${update_status:-none}, curl rc ${update_curl_rc})"
            exit 1
          fi
          if [ "$update_acknowledged" != true ]; then
            echo "::warning::Dokploy writer-fence response was ambiguous, but the compose.one postcondition proves the fence committed"
          fi
          fenced_state_sha256="$(jq -cS \
            '{composeFile,env,sourceType,composeType,serverId,registryId,appName,command,
              autoDeploy,randomize,isolatedDeployment,isolatedDeploymentsVolume,
              suffix,composePath}' "$compose_state" \
            | sha256sum | awk '{print $1}')"
          if ! [[ "$fenced_state_sha256" =~ ^[a-f0-9]{64}$ ]]; then
            echo "::error::Failed to fingerprint the committed Dokploy writer fence"
            exit 1
          fi
          {
            echo 'BEACONHS_DOKPLOY_WRITERS_FENCED=true'
            printf 'DOKPLOY_FENCED_STATE_SHA256=%s\n' "$fenced_state_sha256"
          } >> "$GITHUB_ENV"

          dokploy_get -G -o "$deployments" \
            "${DOKPLOY_URL%/}/api/deployment.allByCompose" \
            --data-urlencode "composeId=$COMPOSE_ID"
          dokploy_get -o "$queue" "${DOKPLOY_URL%/}/api/deployment.queueList"
          if ! jq -e 'type=="array"' "$deployments" >/dev/null \
            || ! jq -e 'type=="array"' "$queue" >/dev/null; then
            echo "::error::Dokploy deployment ledger or queue returned an invalid response"
            exit 1
          fi
          if jq -e --arg cid "$COMPOSE_ID" \
              'any(.[]; .composeId==$cid and .status=="running")' "$deployments" >/dev/null; then
            echo "::error::A Dokploy deployment is already running for the target compose"
            exit 1
          fi
          if jq -e --arg cid "$COMPOSE_ID" \
              'any(.[]; ((.data // {}).composeId // "")==$cid)' "$queue" >/dev/null; then
            echo "::error::A Dokploy queue job already targets the compose; refusing database downtime"
            exit 1
          fi
          echo "Dokploy writer metadata is fenced at zero replicas and its deployment queue is empty"

      - name: Drain writers, run storage prerequisites, and migrate
        env:
          # The unpooled migrator login can SET ROLE to a NOLOGIN owner. Neither
          # credential reaches the long-running deployment containers.
          NODE_ENV: production
          BEACONHS_CUTOVER_TARGET: beaconhs-dev
          MIGRATION_DATABASE_URL: ${{ secrets.DEV_MIGRATION_DATABASE_URL }}
          DATABASE_OWNER_ROLE: beaconhs_owner
          DEV_SUPERADMIN_DATABASE_URL: ${{ secrets.DEV_SUPERADMIN_DATABASE_URL }}
          SUPERADMIN_DATABASE_URL: ${{ secrets.DEV_SUPERADMIN_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PRIVATE_BUCKET_CONFIRMED: ${{ secrets.R2_PRIVATE_BUCKET_CONFIRMED }}
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          APP_URL: ${{ secrets.DEV_APP_URL }}
        run: |
          set -euo pipefail
          umask 077

          if ! command -v docker >/dev/null 2>&1; then
            echo "::error::docker CLI not present on runner (socket mount expected)"
            exit 1
          fi
          if [ "$(docker info --format '{{.Swarm.LocalNodeState}}')" != active ]; then
            echo "::error::deployment runner is not attached to an active Docker Swarm"
            exit 1
          fi

          writer_state="${RUNNER_TEMP}/beaconhs-writers-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.tsv"
          : > "$writer_state"
          chmod 0600 "$writer_state"

          export BEACONHS_SWARM_NODE_STATE_FILE="${RUNNER_TEMP%/}/beaconhs-swarm-original-node-state.tsv"
          scripts/cluster/acquire-swarm-scheduling-fence.sh
          BEACONHS_SWARM_FENCE_NODE_ID="$(cut -f1 "$BEACONHS_SWARM_NODE_STATE_FILE")"
          export BEACONHS_SWARM_FENCE_NODE_ID
          export BEACONHS_SWARM_SCHEDULER_PAUSED=true
          node_state="$BEACONHS_SWARM_NODE_STATE_FILE"
          echo "Swarm scheduling is workflow-fenced; existing non-writer tasks continue running"
          scripts/cluster/assert-swarm-scheduling-paused.sh
          scripts/cluster/assert-cutover-isolation.sh

          wait_for_drain() {
            local service deadline desired task_states nonterminal
            service="$1"
            deadline=$((SECONDS + 180))
            while [ "$SECONDS" -lt "$deadline" ]; do
              desired="$(docker service inspect --format '{{.Spec.Mode.Replicated.Replicas}}' "$service")"
              task_states="$(docker service ps --no-trunc \
                --format '{{.CurrentState}}' "$service")"
              nonterminal="$(printf '%s\n' "$task_states" | awk '
                NF {
                  state=tolower($1)
                  if (state!="complete" && state!="shutdown" && state!="failed"
                      && state!="rejected" && state!="remove" && state!="orphaned") count++
                }
                END { print count + 0 }')"
              if [ "$desired" = 0 ] && [ "$nonterminal" -eq 0 ]; then
                return 0
              fi
              sleep 2
            done
            echo "::error::service ${service} did not drain within 3 minutes"
            docker service ps --no-trunc \
              --format '{{.Name}} | {{.DesiredState}} | {{.CurrentState}} | {{.Error}}' \
              "$service" || true
            return 1
          }

          target_contract_violations() {
            jq -c --arg stack "$DOKPLOY_TARGET_STACK" --arg image "$IMAGE_NAME" '
              [.[]
                | select((.Spec.TaskTemplate.ContainerSpec.Image // "")
                    | startswith($image+":") or startswith($image+"@"))
                | (.Spec.TaskTemplate.ContainerSpec.Env // []) as $env
                | (["web","worker","scheduler","storage-init"]
                    | map(select(. as $role | ($env | index("APP_ROLE="+$role)) != null))) as $roles
                | select(($roles | length)!=1 or .Spec.Name!=($stack+"_"+$roles[0]))
                | .Spec.Name]'
          }

          target_has_exact_service_names() {
            jq -e --arg stack "$DOKPLOY_TARGET_STACK" '
              ([.[].Spec.Name] | sort)==
                (["web","worker","scheduler","storage-init","collabora"]
                  | map($stack+"_"+.) | sort)' >/dev/null
          }

          service_list="$(docker service ls -q)" \
            || { echo "::error::Unable to enumerate Swarm services before drain"; exit 1; }
          if [ -z "$service_list" ]; then
            all_services='[]'
          else
            mapfile -t all_service_ids <<< "$service_list"
            all_services="$(docker service inspect "${all_service_ids[@]}")"
          fi
          # Every writer must belong to the exact Dokploy stack and match its
          # exact service name, BeaconHS image repository, and APP_ROLE.
          stack_services="$(echo "$all_services" | jq -c --arg stack "$DOKPLOY_TARGET_STACK" \
            '[.[] | select((.Spec.Labels // {})["com.docker.stack.namespace"]==$stack)]')"
          if [ "$DOKPLOY_TARGET_STACK_WAS_LIVE" = true ]; then
            if ! echo "$stack_services" | target_has_exact_service_names; then
              echo "::error::Live target stack does not contain exactly the five reviewed compose services"
              exit 1
            fi
          elif [ "$(echo "$stack_services" | jq 'length')" -ne 0 ]; then
            echo "::error::Target stack appeared after the fresh-deployment route audit"
            exit 1
          fi
          rogue_writers="$(echo "$stack_services" | target_contract_violations)"
          if [ "$(echo "$rogue_writers" | jq 'length')" -ne 0 ]; then
            echo "::error::Target stack contains a BeaconHS service whose canonical name and APP_ROLE are inconsistent"
            exit 1
          fi
          for role in web worker scheduler storage-init; do
            expected_name="${DOKPLOY_TARGET_STACK}_${role}"
            service="$(echo "$stack_services" | jq -c --arg name "$expected_name" \
              '[.[] | select(.Spec.Name==$name)]')"
            service_count="$(echo "$service" | jq 'length')"
            if [ "$service_count" -gt 1 ]; then
              echo "::error::Target stack contains duplicate ${role} services"
              exit 1
            fi
            if [ "$service_count" -eq 0 ]; then
              if [ "$DOKPLOY_TARGET_STACK_WAS_LIVE" = true ]; then
                echo "::error::Live target stack is missing its ${role} service"
                exit 1
              fi
              continue
            fi
            service_id="$(echo "$service" | jq -er '.[0].ID')"
            name="$(echo "$service" | jq -er '.[0].Spec.Name')"
            image="$(echo "$service" | jq -er '.[0].Spec.TaskTemplate.ContainerSpec.Image')"
            case "$image" in
              "${IMAGE_NAME}:"*|"${IMAGE_NAME}@"*) ;;
              *) echo "::error::${name} does not use the BeaconHS image repository"; exit 1 ;;
            esac
            if ! echo "$service" | jq -e --arg role "$role" \
                '([.[0].Spec.TaskTemplate.ContainerSpec.Env[]?
                    | select(.==("APP_ROLE="+$role))] | length)==1' >/dev/null; then
              echo "::error::${name} does not contain exactly one APP_ROLE=${role} setting"
              exit 1
            fi
            replicas="$(echo "$service" | jq -er \
              '.[0].Spec.Mode.Replicated.Replicas | select(type=="number" and .>=0 and floor==.)')"
            case "$replicas" in
              ''|*[!0-9]*)
                echo "::error::${name} is not a replicated service; refusing to drain it"
                exit 1
                ;;
            esac
            if [ "$role" = storage-init ]; then
              if ! echo "$service" | jq -e '
                  all(.[0].Spec.TaskTemplate.ContainerSpec.Env[]?;
                    (startswith("DATABASE_URL=") or startswith("SUPERADMIN_DATABASE_URL=")) | not)' \
                  >/dev/null; then
                echo "::error::${name} unexpectedly contains a database credential"
                exit 1
              fi
              continue
            fi
            printf '%s\t%s\t%s\t%s\n' "$role" "$service_id" "$name" "$replicas" >> "$writer_state"
          done
          if [ "$DOKPLOY_TARGET_STACK_WAS_LIVE" = true ]; then
            collabora_name="${DOKPLOY_TARGET_STACK}_collabora"
            collabora_service="$(echo "$stack_services" | jq -c --arg name "$collabora_name" \
              '[.[] | select(.Spec.Name==$name)]')"
            if ! echo "$collabora_service" | jq -e '
                length==1
                  and ((.[0].Spec.TaskTemplate.ContainerSpec.Image // "")
                    | test("^collabora/code:[A-Za-z0-9._-]+@sha256:[0-9a-f]{64}$"))
                  and .[0].Spec.Mode.Replicated.Replicas==1
                  and all(.[0].Spec.TaskTemplate.ContainerSpec.Env[]?;
                    (startswith("DATABASE_URL=") or startswith("SUPERADMIN_DATABASE_URL="))
                      | not)' >/dev/null; then
              echo "::error::Live target Collabora service does not match its pinned, database-free contract"
              exit 1
            fi
          fi

          if [ ! -s "$writer_state" ]; then
            echo "No existing target-stack writer services found; treating this as a fresh deployment"
          else
            scale_args=()
            while IFS=$'\t' read -r role _service_id service replicas; do
              echo "Draining existing ${role} service ${service} (previous replicas: ${replicas})"
              scale_args+=("${service}=0")
            done < "$writer_state"
            docker service scale "${scale_args[@]}" >/dev/null
            while IFS=$'\t' read -r _role _service_id service _replicas; do
              wait_for_drain "$service"
            done < "$writer_state"
          fi
          export BEACONHS_CUTOVER_WRITERS_DRAINED=true
          echo 'BEACONHS_CUTOVER_WRITERS_DRAINED=true' >> "$GITHUB_ENV"

          # The Swarm scheduler fence prevents any concurrent Dokploy/API
          # deployment from starting replacement writers on another node.
          while IFS=$'\t' read -r node availability; do
            if [ "$availability" = active ] \
              && [ "$(docker node inspect --format '{{.Spec.Availability}}' "$node")" != pause ]; then
              echo "::error::Swarm scheduler fence was removed before migration"
              exit 1
            fi
          done < "$node_state"
          current_stack="$(scripts/cluster/read-stack-services.sh "$DOKPLOY_TARGET_STACK")"
          if [ "$DOKPLOY_TARGET_STACK_WAS_LIVE" = true ]; then
            if ! echo "$current_stack" | target_has_exact_service_names; then
              echo "::error::Target stack service set changed while scheduling was paused"
              exit 1
            fi
          elif [ "$(echo "$current_stack" | jq 'length')" -ne 0 ]; then
            echo "::error::A target stack appeared while fresh-deployment scheduling was paused"
            exit 1
          fi
          current_rogue_writers="$(echo "$current_stack" | target_contract_violations)"
          if [ "$(echo "$current_rogue_writers" | jq 'length')" -ne 0 ]; then
            echo "::error::Target stack gained an inconsistent BeaconHS service while scheduling was paused"
            exit 1
          fi
          for role in web worker scheduler; do
            expected_name="${DOKPLOY_TARGET_STACK}_${role}"
            if ! echo "$current_stack" | jq -e --arg name "$expected_name" --arg role "$role" '
                all(.[] | select(.Spec.Name==$name);
                  .Spec.Mode.Replicated.Replicas==0
                    and ([.Spec.TaskTemplate.ContainerSpec.Env[]?
                      | select(.==("APP_ROLE="+$role))] | length)==1)' >/dev/null; then
              echo "::error::Target ${role} service changed or was unfenced before migration"
              exit 1
            fi
          done
          while IFS=$'\t' read -r role service_id service _replicas; do
            if ! echo "$current_stack" | jq -e --arg id "$service_id" --arg name "$service" \
                '([.[] | select(.ID==$id and .Spec.Name==$name
                    and .Spec.Mode.Replicated.Replicas==0)] | length)==1' >/dev/null; then
              echo "::error::The drained ${role} service identity changed before migration"
              exit 1
            fi
            wait_for_drain "$service"
          done < "$writer_state"

          compose_state="$(mktemp)"
          deployments="$(mktemp)"
          queue="$(mktemp)"
          trap 'rm -f "$compose_state" "$deployments" "$queue" "$writer_state"' EXIT
          dokploy_get() {
            scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 20 \
              --retry 2 --retry-delay 2 --retry-all-errors --retry-max-time 30 \
              --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
              --resolve "$DOKPLOY_CURL_RESOLVE" "$@"
          }
          dokploy_get -G -o "$compose_state" "${DOKPLOY_URL%/}/api/compose.one" \
            --data-urlencode "composeId=$COMPOSE_ID"
          current_fence_sha256="$(jq -cS \
            '{composeFile,env,sourceType,composeType,serverId,registryId,appName,command,
              autoDeploy,randomize,isolatedDeployment,isolatedDeploymentsVolume,
              suffix,composePath}' "$compose_state" \
            | sha256sum | awk '{print $1}')"
          if [ -z "${DOKPLOY_FENCED_STATE_SHA256:-}" ] \
            || [ "$current_fence_sha256" != "$DOKPLOY_FENCED_STATE_SHA256" ]; then
            echo "::error::Dokploy compose metadata changed after the writer fence"
            exit 1
          fi
          dokploy_get -G -o "$deployments" \
            "${DOKPLOY_URL%/}/api/deployment.allByCompose" \
            --data-urlencode "composeId=$COMPOSE_ID"
          dokploy_get -o "$queue" "${DOKPLOY_URL%/}/api/deployment.queueList"
          if ! jq -e 'type=="array"' "$deployments" >/dev/null \
            || ! jq -e 'type=="array"' "$queue" >/dev/null \
            || jq -e --arg cid "$COMPOSE_ID" \
              'any(.[]; .composeId==$cid and .status=="running")' "$deployments" >/dev/null \
            || jq -e --arg cid "$COMPOSE_ID" \
              'any(.[]; ((.data // {}).composeId // "")==$cid)' "$queue" >/dev/null; then
            echo "::error::Dokploy deployment state changed after the writer fence"
            exit 1
          fi

          current_domains="$(dokploy_get -G \
            "${DOKPLOY_URL%/}/api/domain.byComposeId" \
            --data-urlencode "composeId=$COMPOSE_ID")"
          if ! echo "$current_domains" | jq -e 'type=="array"' >/dev/null; then
            echo "::error::Dokploy domains became unreadable before migration"
            exit 1
          fi
          current_domain_sha256="$(echo "$current_domains" \
            | jq -cS 'map(del(.compose) | .host |= ascii_downcase) | sort_by(.domainId)' \
            | sha256sum | awk '{print $1}')"
          if [ -z "${DOKPLOY_DOMAIN_SET_SHA256:-}" ] \
            || [ "$current_domain_sha256" != "$DOKPLOY_DOMAIN_SET_SHA256" ]; then
            echo "::error::Dokploy domain metadata changed before migration"
            exit 1
          fi

          host="$(printf '%s' "$APP_URL" \
            | sed -E 's~^https?://~~; s~/+$~~' | tr '[:upper:]' '[:lower:]')"
          service_list="$(docker service ls -q)" \
            || { echo "::error::Unable to enumerate Swarm routes before migration"; exit 1; }
          if [ -z "$service_list" ]; then
            swarm_state='[]'
          else
            mapfile -t service_ids <<< "$service_list"
            swarm_state="$(docker service inspect "${service_ids[@]}")"
          fi
          swarm_route_state="$(echo "$swarm_state" \
            | jq -c -f scripts/cluster/traefik-routes.jq)"
          unsupported_routes="$(echo "$swarm_route_state" | jq -c --arg h "$host" '
            [.unsupported[]
              | select((.reason | contains("host"))
                  or .reason=="unsupported-boolean-expression"
                  or any(.hosts[]?; .==$h))]')"
          if [ "$(echo "$unsupported_routes" | jq 'length')" -ne 0 ]; then
            echo "::error::A Swarm route became unauditable before migration"
            exit 1
          fi
          current_swarm_route_sha256="$(echo "$swarm_route_state" \
            | jq -cS --arg h "$host" '[.routes[] | select(.host==$h)]' \
            | sha256sum | awk '{print $1}')"
          if [ -z "${DOKPLOY_SWARM_ROUTE_SET_SHA256:-}" ] \
            || [ "$current_swarm_route_sha256" != "$DOKPLOY_SWARM_ROUTE_SET_SHA256" ]; then
            echo "::error::Live app-host Swarm routes changed before migration"
            exit 1
          fi

          # Re-enumerate nodes, Swarm services, and standalone containers at
          # the last possible point before the first forward-only DB change.
          scripts/cluster/assert-swarm-scheduling-paused.sh
          scripts/cluster/assert-cutover-isolation.sh

          # These are schema prerequisites, not post-migration maintenance.
          # Both scripts are resumable and idempotent. A failed object-store or
          # database operation leaves writers fenced so the exact-SHA workflow
          # can safely continue; the incompatible schema migration has not yet
          # started at that point.
          cutover_superadmin_url="$(node scripts/cluster/direct-maintenance-database-url.mjs)"
          if [ -z "$cutover_superadmin_url" ]; then
            echo "::error::Failed to derive the direct maintenance database URL"
            exit 1
          fi
          echo "::add-mask::$cutover_superadmin_url"

          assert_pre_schema_cutover_fence() {
            if [ "${BEACONHS_SCHEMA_CUTOVER_STARTED:-}" = true ] \
              || [ "${BEACONHS_SCHEMA_CUTOVER_COMMITTED:-}" = true ]; then
              echo "::error::A pre-schema data prerequisite ran after migration convergence began"
              exit 1
            fi
            scripts/cluster/assert-swarm-scheduling-paused.sh
            scripts/cluster/assert-cutover-isolation.sh
          }

          run_pre_schema_cutover() {
            local label="$1"
            local script="$2"

            assert_pre_schema_cutover_fence
            echo "::group::${label}: pre-apply audit"
            SUPERADMIN_DATABASE_URL="$cutover_superadmin_url" \
              pnpm --filter @beaconhs/web exec tsx "$script"
            echo "::endgroup::"

            assert_pre_schema_cutover_fence
            echo "::group::${label}: apply"
            SUPERADMIN_DATABASE_URL="$cutover_superadmin_url" \
              pnpm --filter @beaconhs/web exec tsx "$script" --apply
            echo "::endgroup::"

            assert_pre_schema_cutover_fence
            echo "::group::${label}: post-apply audit"
            SUPERADMIN_DATABASE_URL="$cutover_superadmin_url" \
              pnpm --filter @beaconhs/web exec tsx "$script"
            echo "::endgroup::"

            assert_pre_schema_cutover_fence
            echo "::group::${label}: idempotency apply"
            SUPERADMIN_DATABASE_URL="$cutover_superadmin_url" \
              pnpm --filter @beaconhs/web exec tsx "$script" --apply
            echo "::endgroup::"
            assert_pre_schema_cutover_fence
          }

          echo 'BEACONHS_PRE_SCHEMA_CUTOVER_STARTED=true' >> "$GITHUB_ENV"
          run_pre_schema_cutover "Stored signatures" scripts/backfill-signatures-to-storage.ts
          run_pre_schema_cutover "Tenant storage keys" scripts/backfill-tenant-storage-keys.ts
          echo 'BEACONHS_PRE_SCHEMA_CUTOVER_COMMITTED=true' >> "$GITHUB_ENV"

          echo "All target writers are drained; Swarm scheduling, routes, and Dokploy metadata remain fenced"
          echo 'BEACONHS_SCHEMA_CUTOVER_STARTED=true' >> "$GITHUB_ENV"
          pnpm --filter @beaconhs/db exec tsx src/migrate.ts
          echo 'BEACONHS_SCHEMA_CUTOVER_COMMITTED=true' >> "$GITHUB_ENV"
          rm -f "$compose_state" "$deployments" "$queue" "$writer_state"
          trap - EXIT
          echo "Migration completed; the forward-only cutover remains scheduler-fenced until the exact-digest deployment"

      - name: Run audited one-time dev data cutover
        if: inputs.operation == 'deploy-and-cutover'
        env:
          NODE_ENV: production
          BEACONHS_CUTOVER_TARGET: beaconhs-dev
          BEACONHS_CUTOVER_WRITERS_DRAINED: 'true'
          DEV_SUPERADMIN_DATABASE_URL: ${{ secrets.DEV_SUPERADMIN_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          MIGRATION_DATABASE_URL: ${{ secrets.DEV_MIGRATION_DATABASE_URL }}
          SUPERADMIN_DATABASE_URL: ${{ secrets.DEV_SUPERADMIN_DATABASE_URL }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PRIVATE_BUCKET_CONFIRMED: ${{ secrets.R2_PRIVATE_BUCKET_CONFIRMED }}
          ATTACHMENT_CAPABILITY_SECRET: ${{ secrets.DEV_ATTACHMENT_CAPABILITY_SECRET }}
        run: |
          set -euo pipefail
          umask 077

          assert_cutover_fence() {
            if [ "${BEACONHS_SCHEMA_CUTOVER_COMMITTED:-}" != true ]; then
              echo "::error::The schema cutover did not reach its verified postcondition"
              exit 1
            fi
            scripts/cluster/assert-swarm-scheduling-paused.sh
            scripts/cluster/assert-cutover-isolation.sh
          }

          assert_cutover_fence

          SUPERADMIN_DATABASE_URL="$(node scripts/cluster/direct-maintenance-database-url.mjs)"
          if [ -z "$SUPERADMIN_DATABASE_URL" ]; then
            echo "::error::Failed to derive the direct maintenance database URL"
            exit 1
          fi
          echo "::add-mask::$SUPERADMIN_DATABASE_URL"
          export SUPERADMIN_DATABASE_URL
          unset DEV_SUPERADMIN_DATABASE_URL

          run_cutover() {
            local label="$1"
            local script="$2"

            echo "::group::${label}: pre-apply audit"
            pnpm --filter @beaconhs/web exec tsx "$script"
            echo "::endgroup::"

            assert_cutover_fence
            echo "::group::${label}: apply"
            pnpm --filter @beaconhs/web exec tsx "$script" --apply
            echo "::endgroup::"

            assert_cutover_fence
            echo "::group::${label}: post-apply audit"
            pnpm --filter @beaconhs/web exec tsx "$script"
            echo "::endgroup::"

            assert_cutover_fence
            echo "::group::${label}: idempotency apply"
            pnpm --filter @beaconhs/web exec tsx "$script" --apply
            echo "::endgroup::"
            assert_cutover_fence
          }

          run_cutover "Credential outputs" scripts/backfill-credential-outputs.ts
          run_cutover "Private attachment URLs" scripts/backfill-private-attachment-urls.ts

      - name: Update compose environment on Dokploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          DEV_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          DEV_SUPERADMIN_DATABASE_URL: ${{ secrets.DEV_SUPERADMIN_DATABASE_URL }}
          REDIS_URL: ${{ secrets.DEV_REDIS_URL }}
          APP_URL: ${{ secrets.DEV_APP_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.DEV_BETTER_AUTH_SECRET }}
          ATTACHMENT_CAPABILITY_SECRET: ${{ secrets.DEV_ATTACHMENT_CAPABILITY_SECRET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PRIVATE_BUCKET_CONFIRMED: ${{ secrets.R2_PRIVATE_BUCKET_CONFIRMED }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          set -euo pipefail
          umask 077
          update_response="$(mktemp)"
          compose_state="$(mktemp)"
          env_block_file="$(mktemp)"
          trap 'rm -f "$update_response" "$compose_state" "$env_block_file"' EXIT
          if [ -z "${DOKPLOY_EXISTING_REGISTRY_ID_JSON:-}" ]; then
            echo "::error::The pre-downtime Dokploy registry identity proof is missing"
            exit 1
          fi
          IMAGE="${IMAGE_NAME}@${IMAGE_DIGEST}"
          COMPOSE_FILE="$(cat deploy/dokploy-dev.compose.yaml)"
          # Collabora is served same-origin on the app domain (Traefik path
          # routes), so both editor and WOPI-callback bases are APP_URL; the
          # server_name is the bare host for Collabora's generated URLs.
          APP_HOST="$(printf '%s' "$APP_URL" | sed -E 's~^https?://~~; s~/+$~~' | tr '[:upper:]' '[:lower:]')"
          ENV_BLOCK="IMAGE=${IMAGE}
          APP_VERSION=${GITHUB_SHA}
          WRITER_REPLICAS=1
          COLLABORA_IMAGE=${COLLABORA_IMAGE}
          COLLABORA_URL=${APP_URL}
          COLLABORA_WOPI_URL=${APP_URL}
          COLLABORA_SERVER_NAME=${APP_HOST}
          DATABASE_URL=${DEV_DATABASE_URL}
          SUPERADMIN_DATABASE_URL=${DEV_SUPERADMIN_DATABASE_URL}
          REDIS_URL=${REDIS_URL}
          APP_URL=${APP_URL}
          BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
          ATTACHMENT_CAPABILITY_SECRET=${ATTACHMENT_CAPABILITY_SECRET}
          R2_ENDPOINT=${R2_ENDPOINT}
          R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
          R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
          R2_BUCKET=${R2_BUCKET}
          R2_PRIVATE_BUCKET_CONFIRMED=${R2_PRIVATE_BUCKET_CONFIRMED}
          VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
          VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
          VAPID_SUBJECT=${VAPID_SUBJECT}
          SENTRY_DSN=${SENTRY_DSN}"
          printf '%s' "$ENV_BLOCK" > "$env_block_file"
          scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 20 \
            --retry 2 --retry-delay 2 --retry-all-errors --retry-max-time 30 \
            --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" --resolve "$DOKPLOY_CURL_RESOLVE" \
            -G -o "$compose_state" "${DOKPLOY_URL%/}/api/compose.one" \
            --data-urlencode "composeId=$COMPOSE_ID"
          current_fenced_state_sha256="$(jq -cS \
            '{composeFile,env,sourceType,composeType,serverId,registryId,appName,command,
              autoDeploy,randomize,isolatedDeployment,isolatedDeploymentsVolume,
              suffix,composePath}' "$compose_state" \
            | sha256sum | awk '{print $1}')"
          if [ -z "${DOKPLOY_FENCED_STATE_SHA256:-}" ] \
            || [ "$current_fenced_state_sha256" != "$DOKPLOY_FENCED_STATE_SHA256" ]; then
            echo "::error::Dokploy compose or registry metadata changed before the final compose update"
            exit 1
          fi
          echo 'BEACONHS_DOKPLOY_FINAL_UPDATE_STARTED=true' >> "$GITHUB_ENV"
          update_curl_rc=0
          update_status="$(
            jq -n --arg id "$COMPOSE_ID" --arg cf "$COMPOSE_FILE" \
              --argjson registry "$DOKPLOY_EXISTING_REGISTRY_ID_JSON" \
              --rawfile env "$env_block_file" \
              '{composeId:$id, sourceType:"raw", composeType:"stack",
                composeFile:$cf, env:$env, command:"", autoDeploy:false,
                randomize:false, isolatedDeployment:false,
                isolatedDeploymentsVolume:false, suffix:"",
                composePath:"./docker-compose.yml", registryId:$registry}' \
              | scripts/cluster/dokploy-curl.sh -sS --connect-timeout 5 --max-time 30 \
                  --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
                  --resolve "$DOKPLOY_CURL_RESOLVE" -o "$update_response" -w "%{http_code}" \
                  -X POST "$DOKPLOY_URL/api/compose.update" \
                  -H "content-type: application/json" --data @-
          )" || update_curl_rc=$?
          update_acknowledged=false
          if [ "$update_curl_rc" -eq 0 ] \
            && [[ "$update_status" =~ ^2[0-9][0-9]$ ]] \
            && jq -e --arg cid "$COMPOSE_ID" '.composeId==$cid' "$update_response" >/dev/null 2>&1; then
            update_acknowledged=true
          fi
          scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 20 \
            --retry 2 --retry-delay 2 --retry-all-errors --retry-max-time 30 \
            --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" --resolve "$DOKPLOY_CURL_RESOLVE" \
            -G -o "$compose_state" "${DOKPLOY_URL%/}/api/compose.one" \
            --data-urlencode "composeId=$COMPOSE_ID"
          if ! jq -e --arg cid "$COMPOSE_ID" --arg cf "$COMPOSE_FILE" \
              --arg stack "$DOKPLOY_TARGET_STACK" \
              --argjson registry "$DOKPLOY_EXISTING_REGISTRY_ID_JSON" \
              --rawfile env "$env_block_file" '
                .composeId==$cid and .serverId==null
                  and .appName==$stack
                  and .registryId==$registry
                  and .composeFile==$cf and .env==$env
                  and .composeType=="stack" and .sourceType=="raw"
                  and .command=="" and .autoDeploy==false
                  and .randomize==false and .isolatedDeployment==false
                  and .isolatedDeploymentsVolume==false and .suffix==""
                  and .composePath=="./docker-compose.yml"
                  and ([.env | split("\n")[] | select(startswith("WRITER_REPLICAS="))]
                    == ["WRITER_REPLICAS=1"])' "$compose_state" >/dev/null; then
            echo "::error::Dokploy final compose/environment postcondition failed after the single update attempt (acknowledged=${update_acknowledged}, HTTP ${update_status:-none}, curl rc ${update_curl_rc})"
            exit 1
          fi
          if [ "$update_acknowledged" != true ]; then
            echo "::warning::Dokploy final compose response was ambiguous, but the compose.one postcondition proves the unfence committed"
          fi
          final_state_sha256="$(jq -cS \
            '{composeFile,env,sourceType,composeType,serverId,registryId,appName,command,
              autoDeploy,randomize,isolatedDeployment,isolatedDeploymentsVolume,
              suffix,composePath}' "$compose_state" \
            | sha256sum | awk '{print $1}')"
          if ! [[ "$final_state_sha256" =~ ^[a-f0-9]{64}$ ]]; then
            echo "::error::Failed to fingerprint the final Dokploy compose state"
            exit 1
          fi
          {
            echo 'BEACONHS_DOKPLOY_WRITERS_FENCED=false'
            printf 'DOKPLOY_FINAL_STATE_SHA256=%s\n' "$final_state_sha256"
          } >> "$GITHUB_ENV"
          echo "Updated Dokploy compose environment for $IMAGE"

      - name: Verify the scheduler fence before materializing the audited deployment
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          MIGRATION_DATABASE_URL: ${{ secrets.DEV_MIGRATION_DATABASE_URL }}
          SUPERADMIN_DATABASE_URL: ${{ secrets.DEV_SUPERADMIN_DATABASE_URL }}
        run: |
          set -euo pipefail
          umask 077
          if [ "${BEACONHS_SCHEMA_CUTOVER_COMMITTED:-}" != true ]; then
            echo "::error::Refusing to resume Swarm scheduling before migration convergence"
            exit 1
          fi
          if [ "${BEACONHS_SWARM_SCHEDULER_PAUSED:-}" != true ] \
            || [ -z "${BEACONHS_SWARM_FENCE_NODE_ID:-}" ] \
            || [ -z "${BEACONHS_SWARM_NODE_STATE_FILE:-}" ] \
            || [ ! -s "$BEACONHS_SWARM_NODE_STATE_FILE" ]; then
            echo "::error::The workflow-owned Swarm scheduler fence record is missing"
            exit 1
          fi
          if [ -z "${DOKPLOY_FINAL_STATE_SHA256:-}" ]; then
            echo "::error::The final Dokploy compose fingerprint is missing"
            exit 1
          fi
          scripts/cluster/assert-swarm-scheduling-paused.sh
          scripts/cluster/assert-cutover-isolation.sh

          compose_state="$(mktemp)"
          deployments="$(mktemp)"
          queue="$(mktemp)"
          trap 'rm -f "$compose_state" "$deployments" "$queue"' EXIT
          dokploy_get() {
            scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 20 \
              --retry 2 --retry-delay 2 --retry-all-errors --retry-max-time 30 \
              --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
              --resolve "$DOKPLOY_CURL_RESOLVE" "$@"
          }
          dokploy_get -G -o "$compose_state" "${DOKPLOY_URL%/}/api/compose.one" \
            --data-urlencode "composeId=$COMPOSE_ID"
          current_state_sha256="$(jq -cS \
            '{composeFile,env,sourceType,composeType,serverId,registryId,appName,command,
              autoDeploy,randomize,isolatedDeployment,isolatedDeploymentsVolume,
              suffix,composePath}' "$compose_state" \
            | sha256sum | awk '{print $1}')"
          if [ "$current_state_sha256" != "$DOKPLOY_FINAL_STATE_SHA256" ]; then
            echo "::error::Dokploy compose metadata changed before the Swarm scheduler could be resumed"
            exit 1
          fi
          dokploy_get -G -o "$deployments" \
            "${DOKPLOY_URL%/}/api/deployment.allByCompose" \
            --data-urlencode "composeId=$COMPOSE_ID"
          dokploy_get -o "$queue" "${DOKPLOY_URL%/}/api/deployment.queueList"
          if ! jq -e 'type=="array"' "$deployments" >/dev/null \
            || ! jq -e 'type=="array"' "$queue" >/dev/null \
            || jq -e --arg cid "$COMPOSE_ID" \
              'any(.[]; .composeId==$cid and .status=="running")' "$deployments" >/dev/null \
            || jq -e --arg cid "$COMPOSE_ID" \
              'any(.[]; ((.data // {}).composeId // "")==$cid)' "$queue" >/dev/null; then
            echo "::error::A Dokploy deployment appeared while Swarm scheduling was paused"
            exit 1
          fi

          stack_services="$(scripts/cluster/read-stack-services.sh "$DOKPLOY_TARGET_STACK")"
          stack_safe=false
          if [ "$DOKPLOY_TARGET_STACK_WAS_LIVE" = false ]; then
            [ "$(echo "$stack_services" | jq 'length')" -eq 0 ] && stack_safe=true
          elif echo "$stack_services" | jq -e --arg stack "$DOKPLOY_TARGET_STACK" \
              --arg image "$IMAGE_NAME" '
                ([.[].Spec.Name] | sort)==
                  (["web","worker","scheduler","storage-init","collabora"]
                    | map($stack+"_"+.) | sort)
                and all(.[];
                  . as $service
                  | ($service.Spec.TaskTemplate.ContainerSpec.Env // []) as $env
                  | if $service.Spec.Name==($stack+"_collabora") then
                      (($service.Spec.TaskTemplate.ContainerSpec.Image // "")
                        | test("^collabora/code:[A-Za-z0-9._-]+@sha256:[0-9a-f]{64}$"))
                        and $service.Spec.Mode.Replicated.Replicas==1
                        and all($env[]?;
                          (startswith("DATABASE_URL=")
                            or startswith("SUPERADMIN_DATABASE_URL=")) | not)
                    elif $service.Spec.Name==($stack+"_storage-init") then
                      (($service.Spec.TaskTemplate.ContainerSpec.Image // "")
                        | startswith($image+":") or startswith($image+"@"))
                        and $service.Spec.Mode.Replicated.Replicas==1
                        and ([$env[]? | select(.=="APP_ROLE=storage-init")] | length)==1
                        and all($env[]?;
                          (startswith("DATABASE_URL=")
                            or startswith("SUPERADMIN_DATABASE_URL=")) | not)
                    else
                      (($service.Spec.TaskTemplate.ContainerSpec.Image // "")
                        | startswith($image+":") or startswith($image+"@"))
                        and $service.Spec.Mode.Replicated.Replicas==0
                        and ([$env[]?
                          | select(.==("APP_ROLE="+($service.Spec.Name
                            | ltrimstr($stack+"_"))))]
                          | length)==1
                    end)' >/dev/null; then
            stack_safe=true
          fi
          if [ "$stack_safe" != true ]; then
            echo "::error::A target-stack writer changed or became schedulable during cutover"
            exit 1
          fi
          while IFS=$'\t' read -r node availability; do
            if [ "$availability" = active ] \
              && [ "$(docker node inspect --format '{{.Spec.Availability}}' "$node")" != pause ]; then
              echo "::error::Workflow-owned scheduler fence is no longer intact on node ${node}"
              exit 1
            fi
          done < "$BEACONHS_SWARM_NODE_STATE_FILE"
          echo "Swarm scheduling remains paused for the exact compose deployment"

      - name: Redeploy reconciled compose on Dokploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          APP_URL: ${{ secrets.DEV_APP_URL }}
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          MIGRATION_DATABASE_URL: ${{ secrets.DEV_MIGRATION_DATABASE_URL }}
          SUPERADMIN_DATABASE_URL: ${{ secrets.DEV_SUPERADMIN_DATABASE_URL }}
        run: |
          set -euo pipefail
          umask 077
          if [ -z "${DOKPLOY_DOMAIN_SET_SHA256:-}" ] \
            || [ -z "${DOKPLOY_SWARM_ROUTE_SET_SHA256:-}" ] \
            || { [ "${DOKPLOY_TARGET_STACK_WAS_LIVE:-}" != true ] \
              && [ "${DOKPLOY_TARGET_STACK_WAS_LIVE:-}" != false ]; }; then
            echo "::error::A pre-downtime Dokploy route fingerprint is missing"
            exit 1
          fi
          current_domains="$(scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 20 \
            --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
            --resolve "$DOKPLOY_CURL_RESOLVE" -G \
            "${DOKPLOY_URL%/}/api/domain.byComposeId" \
            --data-urlencode "composeId=$COMPOSE_ID")" \
            || { echo "::error::domain.byComposeId pre-deploy verification failed"; exit 1; }
          if ! echo "$current_domains" | jq -e 'type=="array"' >/dev/null; then
            echo "::error::domain.byComposeId pre-deploy verification returned an invalid response"
            exit 1
          fi
          current_domain_set_sha256="$(echo "$current_domains" \
            | jq -cS 'map(del(.compose) | .host |= ascii_downcase) | sort_by(.domainId)' \
            | sha256sum | awk '{print $1}')"
          if [ "$current_domain_set_sha256" != "$DOKPLOY_DOMAIN_SET_SHA256" ]; then
            echo "::error::Dokploy domain metadata changed after the pre-downtime postcondition; refusing to materialize an unreviewed route set"
            exit 1
          fi
          echo "Dokploy domain metadata remained unchanged through the database cutover"

          host="$(printf '%s' "$APP_URL" | sed -E 's~^https?://~~; s~/+$~~' | tr '[:upper:]' '[:lower:]')"
          compose_state="$(mktemp)"
          swarm_state="$(mktemp)"
          queue_response="$(mktemp)"
          ledger_response="$(mktemp)"
          deployment_queue="$(mktemp)"
          trap 'rm -f "$compose_state" "$swarm_state" "$queue_response" "$ledger_response" "$deployment_queue"' EXIT
          assert_final_compose_state() {
            local state_sha256 target_stack
            scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 20 \
              --retry 2 --retry-delay 2 --retry-all-errors --retry-max-time 30 \
              --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" --resolve "$DOKPLOY_CURL_RESOLVE" \
              -G -o "$compose_state" "${DOKPLOY_URL%/}/api/compose.one" \
              --data-urlencode "composeId=$COMPOSE_ID"
            state_sha256="$(jq -cS \
              '{composeFile,env,sourceType,composeType,serverId,registryId,appName,command,
                autoDeploy,randomize,isolatedDeployment,isolatedDeploymentsVolume,
                suffix,composePath}' "$compose_state" \
              | sha256sum | awk '{print $1}')"
            if [ -z "${DOKPLOY_FINAL_STATE_SHA256:-}" ] \
              || [ "$state_sha256" != "$DOKPLOY_FINAL_STATE_SHA256" ]; then
              echo "::error::Dokploy compose metadata no longer matches the exact audited deployment state"
              exit 1
            fi
            target_stack="$(jq -er '.appName | select(type=="string" and length>0)' "$compose_state")"
            if [ "$target_stack" != "$DOKPLOY_TARGET_STACK" ]; then
              echo "::error::Dokploy target stack identity changed during cutover"
              exit 1
            fi
          }
          assert_final_compose_state
          target_stack="$DOKPLOY_TARGET_STACK"
          service_list="$(docker service ls -q)" \
            || { echo "::error::Unable to enumerate Docker Swarm services"; exit 1; }
          if [ -z "$service_list" ]; then
            printf '%s\n' '[]' > "$swarm_state"
          else
            mapfile -t service_ids <<< "$service_list"
            docker service inspect "${service_ids[@]}" > "$swarm_state"
          fi
          swarm_route_state="$(jq -c -f scripts/cluster/traefik-routes.jq "$swarm_state")"
          unsupported_routes="$(echo "$swarm_route_state" | jq -c --arg h "$host" '
            [.unsupported[]
              | select((.reason | contains("host"))
                  or .reason=="unsupported-boolean-expression"
                  or any(.hosts[]?; .==$h))
              | {serviceId,serviceName,stack,router,reason}]')"
          if [ "$(echo "$unsupported_routes" | jq 'length')" -ne 0 ]; then
            echo "::error::An app-host-relevant Traefik router became unauditable during cutover"
            exit 1
          fi
          swarm_routes="$(echo "$swarm_route_state" | jq -c '.routes')"
          current_swarm_route_set_sha256="$(echo "$swarm_routes" \
            | jq -cS --arg h "$host" '[.[] | select(.host==$h)]' \
            | sha256sum | awk '{print $1}')"
          if [ "$current_swarm_route_set_sha256" != "$DOKPLOY_SWARM_ROUTE_SET_SHA256" ]; then
            echo "::error::Live app-host Swarm routes changed during cutover; refusing to deploy into an unreviewed route set"
            exit 1
          fi
          if [ "$DOKPLOY_TARGET_STACK_WAS_LIVE" = true ] \
            && ! echo "$swarm_routes" | jq -e --arg h "$host" --arg stack "$target_stack" \
              'any(.[]; .host==$h and .stack==$stack and .path=="/"
                and .pathKind=="prefix")' >/dev/null; then
            echo "::error::The target stack lost its primary live app-host route during cutover"
            exit 1
          fi
          echo "Live app-host Swarm routes remained unchanged through the database cutover"

          deployment_title="BeaconHS GitHub ${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          deployment_description="commit=${GITHUB_SHA};digest=${IMAGE_DIGEST}"
          baseline_deployments="$(scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 20 \
            --retry 2 --retry-delay 2 --retry-all-errors --retry-max-time 30 \
            --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
            --resolve "$DOKPLOY_CURL_RESOLVE" -G \
            "${DOKPLOY_URL%/}/api/deployment.allByCompose" \
            --data-urlencode "composeId=$COMPOSE_ID")" \
            || { echo "::error::deployment.allByCompose baseline failed"; exit 1; }
          if ! echo "$baseline_deployments" | jq -e 'type=="array"' >/dev/null; then
            echo "::error::deployment.allByCompose baseline returned an invalid response"
            exit 1
          fi
          scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 20 \
            --retry 2 --retry-delay 2 --retry-all-errors --retry-max-time 30 \
            --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" --resolve "$DOKPLOY_CURL_RESOLVE" \
            -o "$deployment_queue" "${DOKPLOY_URL%/}/api/deployment.queueList"
          if ! jq -e 'type=="array"' "$deployment_queue" >/dev/null; then
            echo "::error::deployment.queueList baseline returned an invalid response"
            exit 1
          fi
          if echo "$baseline_deployments" | jq -e --arg cid "$COMPOSE_ID" \
              'any(.[]; .composeId==$cid and .status=="running")' >/dev/null; then
            echo "::error::A Dokploy deployment started while the compose was being unfenced"
            exit 1
          fi
          if jq -e --arg cid "$COMPOSE_ID" \
              'any(.[]; ((.data // {}).composeId // "")==$cid)' "$deployment_queue" >/dev/null; then
            echo "::error::A Dokploy queue job appeared while the compose was being unfenced"
            exit 1
          fi
          baseline_deployment_ids="$(echo "$baseline_deployments" \
            | jq -c '[.[].deploymentId | select(type=="string" and length>0)]')"
          scripts/cluster/assert-swarm-scheduling-paused.sh
          scripts/cluster/assert-cutover-isolation.sh
          assert_final_compose_state
          queue_curl_rc=0
          redeploy_status="$(jq -n --arg cid "$COMPOSE_ID" --arg title "$deployment_title" \
              --arg description "$deployment_description" \
              '{composeId:$cid, title:$title, description:$description}' \
            | scripts/cluster/dokploy-curl.sh -sS --connect-timeout 5 --max-time 30 \
                --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
                --resolve "$DOKPLOY_CURL_RESOLVE" -o "$queue_response" -w "%{http_code}" \
                -X POST "${DOKPLOY_URL%/}/api/compose.deploy" \
                -H "content-type: application/json" --data @-)" \
            || queue_curl_rc=$?
          queue_acknowledged=false
          if [ "$queue_curl_rc" -eq 0 ] \
            && [[ "$redeploy_status" =~ ^2[0-9][0-9]$ ]] \
            && jq -e --arg cid "$COMPOSE_ID" \
              '. == true or (.success == true and .composeId == $cid)' "$queue_response" >/dev/null 2>&1; then
            queue_acknowledged=true
            echo "Dokploy acknowledged the unique compose deployment request"
          else
            echo "::warning::Dokploy compose.deploy response was ambiguous (HTTP ${redeploy_status:-none}, curl rc ${queue_curl_rc}); reconciling the unique run marker without re-posting"
          fi

          deployment_done=false
          last_status="not-created"
          creation_deadline=$((SECONDS + 120))
          deadline=$((SECONDS + 1800))
          while [ "$SECONDS" -lt "$deadline" ]; do
            ledger_curl_rc=0
            ledger_status="$(scripts/cluster/dokploy-curl.sh -sS --connect-timeout 5 --max-time 15 \
              --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
              --resolve "$DOKPLOY_CURL_RESOLVE" -G -o "$ledger_response" -w '%{http_code}' \
              "${DOKPLOY_URL%/}/api/deployment.allByCompose" \
              --data-urlencode "composeId=$COMPOSE_ID")" || ledger_curl_rc=$?
            if [ "$ledger_curl_rc" -ne 0 ]; then
              echo "::warning::Transient Dokploy ledger request failure (curl rc ${ledger_curl_rc}); retrying within the deployment deadline"
              sleep 5
              continue
            fi
            case "$ledger_status" in
              2??) ;;
              408|429|5??)
                echo "::warning::Transient Dokploy ledger HTTP ${ledger_status}; retrying within the deployment deadline"
                sleep 5
                continue
                ;;
              *)
                echo "::error::Dokploy ledger returned permanent HTTP ${ledger_status}"
                exit 1
                ;;
            esac
            if ! jq -e 'type=="array"' "$ledger_response" >/dev/null; then
              echo "::warning::Dokploy ledger returned malformed JSON; retrying within the deployment deadline"
              sleep 5
              continue
            fi
            deployments="$(cat "$ledger_response")"
            matches="$(echo "$deployments" | jq -c --arg cid "$COMPOSE_ID" \
              --arg title "$deployment_title" --arg description "$deployment_description" \
              --argjson baseline "$baseline_deployment_ids" \
              '[.[] | . as $deployment
                | select(.composeId==$cid and .title==$title
                  and .description==$description
                  and ($baseline | index($deployment.deploymentId)) == null)]')"
            match_count="$(echo "$matches" | jq 'length')"
            if [ "$match_count" -gt 1 ]; then
              echo "::error::Dokploy recorded multiple deployments for this unique GitHub run attempt"
              exit 1
            fi
            if [ "$match_count" -eq 0 ] && [ "$SECONDS" -ge "$creation_deadline" ]; then
              echo "::error::Dokploy did not record the unique deployment marker within 2 minutes (acknowledged=${queue_acknowledged}, HTTP ${redeploy_status:-none}, curl rc ${queue_curl_rc})"
              exit 1
            fi
            if [ "$match_count" -eq 1 ]; then
              deployment_id="$(echo "$matches" | jq -er '.[0].deploymentId
                | select(type=="string" and length>0)')"
              last_status="$(echo "$matches" | jq -er '.[0].status
                | select(type=="string" and length>0)')"
              case "$last_status" in
                done)
                  if ! echo "$matches" | jq -e '.[0].finishedAt
                      | select(type=="string" and length>0)' >/dev/null; then
                    echo "::error::Dokploy deployment ${deployment_id} is done without a completion timestamp"
                    exit 1
                  fi
                  deployment_done=true
                  break
                  ;;
                running) ;;
                error|cancelled)
                  echo "::error::Dokploy deployment ${deployment_id} finished with status ${last_status}"
                  exit 1
                  ;;
                *)
                  echo "::error::Dokploy deployment ${deployment_id} returned unsupported status ${last_status}"
                  exit 1
                  ;;
              esac
            fi
            sleep 5
          done
          if [ "$deployment_done" != true ]; then
            echo "::error::Dokploy deployment did not finish within 30 minutes (last status ${last_status})"
            exit 1
          fi
          assert_final_compose_state
          scripts/cluster/assert-swarm-scheduling-paused.sh
          scripts/cluster/assert-cutover-isolation.sh
          echo "Dokploy deployment ${deployment_id} completed successfully while Swarm scheduling remained paused"

      - name: Verify exact deployment specs and resume Swarm scheduling
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          MIGRATION_DATABASE_URL: ${{ secrets.DEV_MIGRATION_DATABASE_URL }}
          SUPERADMIN_DATABASE_URL: ${{ secrets.DEV_SUPERADMIN_DATABASE_URL }}
          REDIS_URL: ${{ secrets.DEV_REDIS_URL }}
          APP_URL: ${{ secrets.DEV_APP_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.DEV_BETTER_AUTH_SECRET }}
          ATTACHMENT_CAPABILITY_SECRET: ${{ secrets.DEV_ATTACHMENT_CAPABILITY_SECRET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PRIVATE_BUCKET_CONFIRMED: ${{ secrets.R2_PRIVATE_BUCKET_CONFIRMED }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          set -euo pipefail
          umask 077
          if [ "${BEACONHS_SCHEMA_CUTOVER_COMMITTED:-}" != true ] \
            || [ "${BEACONHS_SWARM_SCHEDULER_PAUSED:-}" != true ] \
            || [ -z "${BEACONHS_SWARM_FENCE_NODE_ID:-}" ] \
            || [ -z "${BEACONHS_SWARM_NODE_STATE_FILE:-}" ] \
            || [ ! -s "$BEACONHS_SWARM_NODE_STATE_FILE" ] \
            || [ -z "${DOKPLOY_FINAL_STATE_SHA256:-}" ]; then
            echo "::error::Required schema, compose, or scheduler-fence state is missing"
            exit 1
          fi

          compose_state="$(mktemp)"
          deployments="$(mktemp)"
          queue="$(mktemp)"
          trap 'rm -f "$compose_state" "$deployments" "$queue"' EXIT
          dokploy_get() {
            scripts/cluster/dokploy-curl.sh -sS --fail --connect-timeout 5 --max-time 20 \
              --retry 2 --retry-delay 2 --retry-all-errors --retry-max-time 30 \
              --noproxy "${DOKPLOY_CURL_RESOLVE%%:*}" \
              --resolve "$DOKPLOY_CURL_RESOLVE" "$@"
          }
          assert_control_plane_idle_and_exact() {
            local state_sha256
            dokploy_get -G -o "$compose_state" "${DOKPLOY_URL%/}/api/compose.one" \
              --data-urlencode "composeId=$COMPOSE_ID"
            state_sha256="$(jq -cS \
              '{composeFile,env,sourceType,composeType,serverId,registryId,appName,command,
                autoDeploy,randomize,isolatedDeployment,isolatedDeploymentsVolume,
                suffix,composePath}' "$compose_state" \
              | sha256sum | awk '{print $1}')"
            if [ "$state_sha256" != "$DOKPLOY_FINAL_STATE_SHA256" ]; then
              echo "::error::Dokploy compose metadata changed before scheduler release"
              return 1
            fi
            dokploy_get -G -o "$deployments" \
              "${DOKPLOY_URL%/}/api/deployment.allByCompose" \
              --data-urlencode "composeId=$COMPOSE_ID"
            dokploy_get -o "$queue" "${DOKPLOY_URL%/}/api/deployment.queueList"
            if ! jq -e 'type=="array"' "$deployments" >/dev/null \
              || ! jq -e 'type=="array"' "$queue" >/dev/null \
              || jq -e --arg cid "$COMPOSE_ID" \
                'any(.[]; .composeId==$cid and .status=="running")' "$deployments" >/dev/null \
              || jq -e --arg cid "$COMPOSE_ID" \
                'any(.[]; ((.data // {}).composeId // "")==$cid)' "$queue" >/dev/null; then
              echo "::error::Dokploy control-plane work appeared before scheduler release"
              return 1
            fi
          }

          IMAGE="${IMAGE_NAME}@${IMAGE_DIGEST}"
          APP_HOST="$(printf '%s' "$APP_URL" \
            | sed -E 's~^https?://~~; s~/+$~~' | tr '[:upper:]' '[:lower:]')"
          COLLABORA_EXTRA_PARAMS="--o:ssl.enable=false --o:ssl.termination=true --o:net.frame_ancestors=${APP_URL} --o:welcome.enable=false --o:home_mode.enable=true"
          assert_exact_stack() {
            local stack_services
            stack_services="$(scripts/cluster/read-stack-services.sh "$DOKPLOY_TARGET_STACK")"
            printf '%s' "$stack_services" | jq -e \
              --arg stack "$DOKPLOY_TARGET_STACK" --arg image "$IMAGE" \
              --arg collabora "$COLLABORA_IMAGE" --arg sha "$GITHUB_SHA" \
              --arg collabora_extra "$COLLABORA_EXTRA_PARAMS" --arg app_host "$APP_HOST" '
                def one($env; $key; $value):
                  ([$env[]? | select(startswith($key+"="))]
                    == [$key+"="+$value]);
                def exact_keys($env; $keys):
                  ([$env[]? | split("=")[0]] | sort)==($keys | sort);
                def exact_image($actual; $expected):
                  $actual==$expected;
                def base($service; $name; $expected_image; $role):
                  $service.Spec.Name==($stack+"_"+$name)
                    and exact_image($service.Spec.TaskTemplate.ContainerSpec.Image; $expected_image)
                    and $service.Spec.Mode.Replicated.Replicas==1
                    and (($service.Spec.TaskTemplate.Placement.Constraints // [])
                      == ["node.hostname==dokploy-mgr"])
                    and one(($service.Spec.TaskTemplate.ContainerSpec.Env // []);
                      "APP_ROLE"; $role);
                def service($name):
                  [.[] | select(.Spec.Name==($stack+"_"+$name))]
                  | if length==1 then .[0] else error("invalid service cardinality") end;
                service("web") as $web
                | service("worker") as $worker
                | service("scheduler") as $scheduler
                | service("storage-init") as $storage
                | service("collabora") as $editor
                | ($web.Spec.TaskTemplate.ContainerSpec.Env // []) as $web_env
                | ($worker.Spec.TaskTemplate.ContainerSpec.Env // []) as $worker_env
                | ($scheduler.Spec.TaskTemplate.ContainerSpec.Env // []) as $scheduler_env
                | ($storage.Spec.TaskTemplate.ContainerSpec.Env // []) as $storage_env
                | ($editor.Spec.TaskTemplate.ContainerSpec.Env // []) as $editor_env
                | (
                ([.[].Spec.Name] | sort)==
                  (["web","worker","scheduler","storage-init","collabora"]
                    | map($stack+"_"+.) | sort)
                  and exact_keys($web_env; [
                    "APP_ROLE","NODE_ENV","HOSTNAME","PORT","APP_VERSION",
                    "SENTRY_DSN","SENTRY_ENVIRONMENT","DATABASE_URL",
                    "SUPERADMIN_DATABASE_URL","REDIS_URL","BETTER_AUTH_SECRET",
                    "ATTACHMENT_CAPABILITY_SECRET","BETTER_AUTH_URL","APP_URL",
                    "R2_ENDPOINT","R2_ACCESS_KEY_ID","R2_SECRET_ACCESS_KEY",
                    "R2_BUCKET","R2_PRIVATE_BUCKET_CONFIRMED","VAPID_PUBLIC_KEY",
                    "VAPID_PRIVATE_KEY","VAPID_SUBJECT","COLLABORA_URL",
                    "COLLABORA_WOPI_URL"])
                  and base($web; "web"; $image; "web")
                  and one($web_env; "NODE_ENV"; "production")
                  and one($web_env; "HOSTNAME"; "0.0.0.0")
                  and one($web_env; "PORT"; "3000")
                  and one($web_env; "APP_VERSION"; $sha)
                  and one($web_env; "SENTRY_DSN"; env.SENTRY_DSN)
                  and one($web_env; "SENTRY_ENVIRONMENT"; "dev")
                  and one($web_env; "DATABASE_URL"; env.DATABASE_URL)
                  and one($web_env; "SUPERADMIN_DATABASE_URL"; env.SUPERADMIN_DATABASE_URL)
                  and one($web_env; "REDIS_URL"; env.REDIS_URL)
                  and one($web_env; "BETTER_AUTH_SECRET"; env.BETTER_AUTH_SECRET)
                  and one($web_env; "ATTACHMENT_CAPABILITY_SECRET"; env.ATTACHMENT_CAPABILITY_SECRET)
                  and one($web_env; "APP_URL"; env.APP_URL)
                  and one($web_env; "BETTER_AUTH_URL"; env.APP_URL)
                  and one($web_env; "R2_ENDPOINT"; env.R2_ENDPOINT)
                  and one($web_env; "R2_ACCESS_KEY_ID"; env.R2_ACCESS_KEY_ID)
                  and one($web_env; "R2_SECRET_ACCESS_KEY"; env.R2_SECRET_ACCESS_KEY)
                  and one($web_env; "R2_BUCKET"; env.R2_BUCKET)
                  and one($web_env; "R2_PRIVATE_BUCKET_CONFIRMED"; env.R2_PRIVATE_BUCKET_CONFIRMED)
                  and one($web_env; "VAPID_PUBLIC_KEY"; env.VAPID_PUBLIC_KEY)
                  and one($web_env; "VAPID_PRIVATE_KEY"; env.VAPID_PRIVATE_KEY)
                  and one($web_env; "VAPID_SUBJECT"; env.VAPID_SUBJECT)
                  and one($web_env; "COLLABORA_URL"; env.APP_URL)
                  and one($web_env; "COLLABORA_WOPI_URL"; env.APP_URL)
                  and exact_keys($worker_env; [
                    "APP_ROLE","NODE_ENV","APP_VERSION","SENTRY_DSN",
                    "SENTRY_ENVIRONMENT","BETTER_AUTH_SECRET","DATABASE_URL",
                    "SUPERADMIN_DATABASE_URL","REDIS_URL","R2_ENDPOINT",
                    "R2_ACCESS_KEY_ID","R2_SECRET_ACCESS_KEY","R2_BUCKET",
                    "R2_PRIVATE_BUCKET_CONFIRMED","APP_URL","INTERNAL_WEB_URL",
                    "VAPID_PUBLIC_KEY","VAPID_PRIVATE_KEY","VAPID_SUBJECT"])
                  and base($worker; "worker"; $image; "worker")
                  and one($worker_env; "NODE_ENV"; "production")
                  and one($worker_env; "APP_VERSION"; $sha)
                  and one($worker_env; "SENTRY_DSN"; env.SENTRY_DSN)
                  and one($worker_env; "SENTRY_ENVIRONMENT"; "dev")
                  and one($worker_env; "DATABASE_URL"; env.DATABASE_URL)
                  and one($worker_env; "SUPERADMIN_DATABASE_URL"; env.SUPERADMIN_DATABASE_URL)
                  and one($worker_env; "REDIS_URL"; env.REDIS_URL)
                  and one($worker_env; "BETTER_AUTH_SECRET"; env.BETTER_AUTH_SECRET)
                  and one($worker_env; "APP_URL"; env.APP_URL)
                  and one($worker_env; "INTERNAL_WEB_URL"; "http://web:3000")
                  and one($worker_env; "R2_ENDPOINT"; env.R2_ENDPOINT)
                  and one($worker_env; "R2_ACCESS_KEY_ID"; env.R2_ACCESS_KEY_ID)
                  and one($worker_env; "R2_SECRET_ACCESS_KEY"; env.R2_SECRET_ACCESS_KEY)
                  and one($worker_env; "R2_BUCKET"; env.R2_BUCKET)
                  and one($worker_env; "R2_PRIVATE_BUCKET_CONFIRMED"; env.R2_PRIVATE_BUCKET_CONFIRMED)
                  and one($worker_env; "VAPID_PUBLIC_KEY"; env.VAPID_PUBLIC_KEY)
                  and one($worker_env; "VAPID_PRIVATE_KEY"; env.VAPID_PRIVATE_KEY)
                  and one($worker_env; "VAPID_SUBJECT"; env.VAPID_SUBJECT)
                  and exact_keys($scheduler_env; [
                    "APP_ROLE","NODE_ENV","APP_VERSION","SENTRY_DSN",
                    "SENTRY_ENVIRONMENT","DATABASE_URL","REDIS_URL"])
                  and base($scheduler; "scheduler"; $image; "scheduler")
                  and one($scheduler_env; "NODE_ENV"; "production")
                  and one($scheduler_env; "APP_VERSION"; $sha)
                  and one($scheduler_env; "SENTRY_DSN"; env.SENTRY_DSN)
                  and one($scheduler_env; "SENTRY_ENVIRONMENT"; "dev")
                  and one($scheduler_env; "DATABASE_URL"; env.DATABASE_URL)
                  and one($scheduler_env; "REDIS_URL"; env.REDIS_URL)
                  and exact_keys($storage_env; [
                    "APP_ROLE","NODE_ENV","R2_ENDPOINT","R2_ACCESS_KEY_ID",
                    "R2_SECRET_ACCESS_KEY","R2_BUCKET","R2_PRIVATE_BUCKET_CONFIRMED"])
                  and base($storage; "storage-init"; $image; "storage-init")
                  and one($storage_env; "NODE_ENV"; "production")
                  and one($storage_env; "R2_ENDPOINT"; env.R2_ENDPOINT)
                  and one($storage_env; "R2_ACCESS_KEY_ID"; env.R2_ACCESS_KEY_ID)
                  and one($storage_env; "R2_SECRET_ACCESS_KEY"; env.R2_SECRET_ACCESS_KEY)
                  and one($storage_env; "R2_BUCKET"; env.R2_BUCKET)
                  and one($storage_env; "R2_PRIVATE_BUCKET_CONFIRMED"; env.R2_PRIVATE_BUCKET_CONFIRMED)
                  and exact_keys($editor_env; ["aliasgroup1","server_name","extra_params"])
                  and $editor.Spec.Name==($stack+"_collabora")
                  and exact_image($editor.Spec.TaskTemplate.ContainerSpec.Image; $collabora)
                  and $editor.Spec.Mode.Replicated.Replicas==1
                  and (($editor.Spec.TaskTemplate.Placement.Constraints // [])
                    == ["node.hostname==dokploy-mgr"])
                  and one($editor_env; "aliasgroup1"; env.APP_URL)
                  and one($editor_env; "server_name"; $app_host)
                  and one($editor_env; "extra_params"; $collabora_extra)
                )' >/dev/null
          }

          assert_control_plane_idle_and_exact
          scripts/cluster/assert-swarm-scheduling-paused.sh
          scripts/cluster/assert-cutover-isolation.sh
          if ! assert_exact_stack; then
            echo "::error::Dokploy did not materialize the exact reviewed five-service deployment contract"
            exit 1
          fi

          for role in web worker scheduler; do
            service="${DOKPLOY_TARGET_STACK}_${role}"
            pending=false
            deadline=$((SECONDS + 60))
            while [ "$SECONDS" -lt "$deadline" ]; do
              states="$(docker service ps --no-trunc --filter desired-state=running \
                --format '{{.CurrentState}}' "$service")"
              if [ "$(printf '%s\n' "$states" | awk 'NF { count++ } END { print count + 0 }')" -eq 1 ] \
                && grep -Eq '^Pending ' <<< "$states"; then
                pending=true
                break
              fi
              sleep 2
            done
            if [ "$pending" != true ]; then
              echo "::error::Writer ${service} was not held in exactly one pending task by the scheduler fence"
              docker service ps --no-trunc \
                --format '{{.Name}} | {{.DesiredState}} | {{.CurrentState}} | {{.Error}}' \
                "$service" || true
              exit 1
            fi
          done

          # This is the final pre-release proof. Only nodes that this workflow
          # changed from active to pause are restored; pre-existing drain/pause
          # states and newly joined paused nodes remain untouched.
          assert_control_plane_idle_and_exact
          scripts/cluster/assert-swarm-scheduling-paused.sh
          scripts/cluster/assert-cutover-isolation.sh
          assert_exact_stack
          while IFS=$'\t' read -r node availability; do
            if [ "$availability" = active ]; then
              docker node update --availability active "$node" >/dev/null
            fi
          done < "$BEACONHS_SWARM_NODE_STATE_FILE"
          while IFS=$'\t' read -r node availability; do
            if [ "$availability" = active ] \
              && [ "$(docker node inspect --format '{{.Spec.Availability}}' "$node")" != active ]; then
              echo "::error::Swarm node ${node} did not resume active scheduling"
              exit 1
            fi
          done < "$BEACONHS_SWARM_NODE_STATE_FILE"
          scripts/cluster/release-swarm-scheduling-fence.sh
          echo "Exact-digest service specs were materialized before Swarm scheduling resumed"

      - name: Wait for Swarm convergence and external readiness
        env:
          APP_URL: ${{ secrets.DEV_APP_URL }}
        run: |
          set -euo pipefail
          IMAGE="${IMAGE_NAME}@${IMAGE_DIGEST}"

          service_for_role() {
            local role="$1" expected_image="$2" expected_name matches actual_image
            expected_name="${DOKPLOY_TARGET_STACK}_${role}"
            matches="$(echo "$STACK_SERVICES" | jq -c --arg name "$expected_name" \
              '[.[] | select(.Spec.Name==$name)]')"
            [ "$(echo "$matches" | jq 'length')" -eq 1 ] || return 1
            actual_image="$(echo "$matches" | jq -er '.[0].Spec.TaskTemplate.ContainerSpec.Image')"
            [ "$actual_image" = "$expected_image" ] || return 1
            echo "$matches" | jq -e --arg role "$role" '
              .[0].Spec.Mode.Replicated.Replicas==1
                and (if $role=="collabora" then true
                  else ([.[0].Spec.TaskTemplate.ContainerSpec.Env[]?
                    | select(.==("APP_ROLE="+$role))] | length)==1
                  end)' >/dev/null \
              || return 1
            printf '%s\n' "$expected_name"
          }

          service_is_healthy() {
            local service="$1" task task_states container health
            task_states="$(docker service ps --no-trunc --filter desired-state=running \
              --format '{{.ID}}|{{.CurrentState}}' "$service")" || return 1
            task="$(awk -F'|' '$2 ~ /^Running / { print $1; exit }' \
              <<< "$task_states")"
            [ -n "$task" ] || return 1
            container="$(docker inspect --format '{{.Status.ContainerStatus.ContainerID}}' "$task")"
            [ -n "$container" ] || return 1
            health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' "$container")"
            [ "$health" = healthy ]
          }

          scheduler_completed() {
            local service="$1" state task_states
            task_states="$(docker service ps --no-trunc \
              --format '{{.CurrentState}}' "$service")" || return 1
            state="${task_states%%$'\n'*}"
            case "$state" in Complete\ *) return 0 ;; *) return 1 ;; esac
          }

          service_is_running() {
            local states
            states="$(docker service ps --no-trunc --filter desired-state=running \
              --format '{{.CurrentState}}' "$1")" || return 1
            grep -Eq '^Running ' <<< "$states"
          }

          deadline=$((SECONDS + 900))
          converged=false
          web_service=""
          worker_service=""
          scheduler_service=""
          storage_init_service=""
          collabora_service=""
          while [ "$SECONDS" -lt "$deadline" ]; do
            STACK_SERVICES="$(scripts/cluster/read-stack-services.sh "$DOKPLOY_TARGET_STACK")"
            stack_contract_valid=false
            if echo "$STACK_SERVICES" | jq -e --arg stack "$DOKPLOY_TARGET_STACK" '
                ([.[].Spec.Name] | sort)==
                  (["web","worker","scheduler","storage-init","collabora"]
                    | map($stack+"_"+.) | sort)
                and all(.[];
                  (.Spec.TaskTemplate.ContainerSpec.Env // []) as $env
                  | if .Spec.Name==($stack+"_collabora") then
                      (["web","worker","scheduler","storage-init"]
                        | all(. as $role | ($env | index("APP_ROLE="+$role))==null))
                    else
                      (["web","worker","scheduler","storage-init"]
                        | map(select(. as $role | ($env | index("APP_ROLE="+$role)) != null))) as $roles
                      | ($roles | length)==1 and .Spec.Name==($stack+"_"+$roles[0])
                    end)' >/dev/null; then
              stack_contract_valid=true
            fi
            web_service="$(service_for_role web "$IMAGE" || true)"
            worker_service="$(service_for_role worker "$IMAGE" || true)"
            scheduler_service="$(service_for_role scheduler "$IMAGE" || true)"
            storage_init_service="$(service_for_role storage-init "$IMAGE" || true)"
            collabora_service="$(service_for_role collabora "$COLLABORA_IMAGE" || true)"
            if [ -n "$web_service" ] && [ -n "$worker_service" ] \
              && [ -n "$scheduler_service" ] && [ -n "$storage_init_service" ] \
              && [ -n "$collabora_service" ] && [ "$stack_contract_valid" = true ] \
              && service_is_healthy "$web_service" \
              && service_is_healthy "$worker_service" \
              && scheduler_completed "$scheduler_service" \
              && scheduler_completed "$storage_init_service" \
              && service_is_running "$collabora_service"; then
              converged=true
              echo "Swarm services converged on ${GITHUB_SHA}"
              break
            fi
            sleep 10
          done
          if [ "$converged" != true ]; then
            echo "::error::Swarm did not converge on ${GITHUB_SHA} within 15 minutes"
            for service in \
              "$web_service" "$worker_service" "$scheduler_service" "$storage_init_service" \
              "$collabora_service"; do
              [ -n "$service" ] || continue
              docker service ps --no-trunc --format '{{.Name}} | {{.CurrentState}} | {{.Error}}' "$service" || true
            done
            exit 1
          fi

          response="$(mktemp)"
          discovery="$(mktemp)"
          trap 'rm -f "$response" "$discovery"' EXIT
          ready=false
          for _attempt in $(seq 1 40); do
            status="$(curl -sS --connect-timeout 5 --max-time 10 \
              -o "$response" -w '%{http_code}' \
              "${APP_URL%/}/api/health/ready" || true)"
            version="$(jq -r '.version // empty' "$response" 2>/dev/null || true)"
            health="$(jq -r '.status // empty' "$response" 2>/dev/null || true)"
            if [ "$status" = 200 ] && [ "$health" = ready ] && [ "$version" = "$GITHUB_SHA" ]; then
              ready=true
              break
            fi
            sleep 15
          done
          if [ "$ready" != true ]; then
            echo "::error::External readiness did not confirm ${GITHUB_SHA}"
            exit 1
          fi

          login_ready=false
          login_status="not-requested"
          login_curl_rc=0
          for _attempt in $(seq 1 10); do
            login_curl_rc=0
            login_status="$(curl -sS --proto '=https' --connect-timeout 5 --max-time 15 \
              --max-redirs 0 -o "$response" -w '%{http_code}' \
              "${APP_URL%/}/login")" || login_curl_rc=$?
            if [ "$login_curl_rc" -eq 0 ] && [ "$login_status" = 200 ] \
              && grep -Eiq '<!doctype html|<html' "$response"; then
              login_ready=true
              break
            fi
            sleep 5
          done
          if [ "$login_ready" != true ]; then
            echo "::error::External login did not return an exact HTML 200 response (last HTTP ${login_status}, curl rc ${login_curl_rc})"
            exit 1
          fi
          echo "External login exact-200 smoke check passed"

          discovery_ready=false
          discovery_status="not-requested"
          discovery_curl_rc=0
          for _attempt in $(seq 1 40); do
            discovery_curl_rc=0
            discovery_status="$(curl -sS --connect-timeout 5 --max-time 15 \
              --max-filesize 1048576 \
              -o "$discovery" -w '%{http_code}' \
              "${APP_URL%/}/hosting/discovery")" || discovery_curl_rc=$?
            if [ "$discovery_curl_rc" -eq 0 ] && [ "$discovery_status" = 200 ] \
              && DISCOVERY_PATH="$discovery" EXPECTED_COLLABORA_ORIGIN="${APP_URL%/}" \
                pnpm --filter @beaconhs/web exec tsx -e '
                  import { readFileSync } from "node:fs";
                  import { resolveCollaboraEditUrlBytes } from "./src/lib/collabora.ts";
                  const path = process.env.DISCOVERY_PATH;
                  const origin = process.env.EXPECTED_COLLABORA_ORIGIN;
                  if (!path || !origin) process.exit(1);
                  const body = readFileSync(path);
                  for (const app of ["presentation", "text"] as const) {
                    if (!resolveCollaboraEditUrlBytes(body, origin, app)) process.exit(1);
                  }
                '
            then
              discovery_ready=true
              break
            fi
            sleep 10
          done
          if [ "$discovery_ready" != true ]; then
            echo "::error::Collabora discovery did not become ready with its PPTX/DOCX edit-action contract (last HTTP ${discovery_status}, curl rc ${discovery_curl_rc})"
            exit 1
          fi
          echo "External web, auth entrypoint, and Collabora discovery checks passed"

      - name: Report uncertain Dokploy writer fence
        if: (failure() || cancelled()) && env.BEACONHS_DOKPLOY_WRITER_FENCE_UPDATE_STARTED == 'true' && env.BEACONHS_DOKPLOY_WRITERS_FENCED != 'true'
        run: |
          echo "::error::The workflow failed after posting the zero-writer compose update but before its exact compose.one postcondition was proved. The Dokploy writer fence state is unknown; inspect compose.one before any manual/API deployment and do not assume the previous replica setting survived."

      - name: Report retained Dokploy writer fence
        if: (failure() || cancelled()) && env.BEACONHS_DOKPLOY_WRITERS_FENCED == 'true' && env.BEACONHS_DOKPLOY_FINAL_UPDATE_STARTED != 'true'
        run: |
          echo "::error::The workflow failed while Dokploy compose metadata remained fenced at WRITER_REPLICAS=0. Any manual/API Dokploy deployment will keep web, worker, and scheduler at zero until this audited workflow succeeds. Do not remove the fence manually during a cutover."

      - name: Report interrupted Dokploy writer unfence
        if: (failure() || cancelled()) && env.BEACONHS_DOKPLOY_FINAL_UPDATE_STARTED == 'true' && env.BEACONHS_DOKPLOY_WRITERS_FENCED != 'false'
        run: |
          echo "::error::The workflow failed while reconciling the final Dokploy compose update. Its writer-replica state is unknown; inspect compose.one and the Swarm scheduler fence before any manual action. Do not post another deployment until the exact compose/environment postcondition is restored."

      - name: Report retained Swarm scheduler fence
        if: (failure() || cancelled()) && env.BEACONHS_SWARM_SCHEDULER_PAUSED == 'true'
        run: |
          echo "::error::The workflow failed after durably claiming the Swarm scheduler fence; the previously active manager may remain paused. A retained pause deliberately prevents a concurrent deployment from scheduling database writers. The claim stored in Swarm node labels lets the next audited workflow reconcile this exact transition after it verifies the repository, stack, node identity, and current availability. Do not reactivate scheduling or remove those labels while migration or data-cutover state is unknown."

      - name: Report resumable pre-schema cutover failure
        if: (failure() || cancelled()) && env.BEACONHS_PRE_SCHEMA_CUTOVER_STARTED == 'true' && env.BEACONHS_PRE_SCHEMA_CUTOVER_COMMITTED != 'true'
        run: |
          echo "::error::A required stored-signature or tenant-storage-key cutover may have partially converged before schema migration began. Writers remain intentionally fenced. Both cutovers use immutable/deterministic state and verified idempotent replay; rerun this exact-SHA workflow to resume, and do not restore the old writers or delete cutover objects manually."

      - name: Report forward-only migration failure
        if: (failure() || cancelled()) && env.BEACONHS_SCHEMA_CUTOVER_STARTED == 'true' && env.BEACONHS_SCHEMA_CUTOVER_COMMITTED != 'true'
        run: |
          echo "::error::Migration convergence started and may have committed one or more independent schema, RLS, grant, authorization-data, statistics, or reporting-view phases. Old writers were intentionally NOT restored. Inspect the migration output and rerun the exact-SHA workflow or perform an explicit database restore; an unchanged Drizzle ledger alone is not rollback proof."

      - name: Report forward-only deployment failure after schema cutover
        if: (failure() || cancelled()) && env.BEACONHS_SCHEMA_CUTOVER_COMMITTED == 'true'
        run: |
          echo "::error::Schema/RLS/grant/authorization/reporting convergence completed, but a later data-cutover or Dokploy deployment phase failed. The incompatible old web/worker services were intentionally NOT restarted. Redeploy ${IMAGE_NAME}@${IMAGE_DIGEST} or perform an explicit database restore/cutover; do not manually revive the prior application image against the migrated schema."
