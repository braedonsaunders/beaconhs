name: Deploy (dev)

# Build the single app image, push to GHCR, run DB migrations against the dev
# cluster, then tell Dokploy to redeploy the dev stack with the new image tag.
# Runs on a self-hosted runner (on the Dokploy LAN) so it can reach the DB
# (10.0.0.86) and the Dokploy API (10.0.0.101).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/braedonsaunders/beaconhs

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & push image
        run: |
          IMG_SHA="${IMAGE_NAME}:${GITHUB_SHA}"
          IMG_DEV="${IMAGE_NAME}:dev"
          docker build -t "$IMG_SHA" -t "$IMG_DEV" .
          docker push "$IMG_SHA"
          docker push "$IMG_DEV"
          echo "IMAGE=$IMG_SHA" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - name: Install (migrations only)
        run: pnpm install --frozen-lockfile

      - name: Run DB migrations + RLS + views
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
        run: pnpm --filter @beaconhs/db exec tsx src/migrate.ts

      - name: Push env + redeploy on Dokploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          DEV_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          APP_URL: ${{ secrets.DEV_APP_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.DEV_BETTER_AUTH_SECRET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          set -euo pipefail
          COMPOSE_FILE="$(cat deploy/dokploy-dev.compose.yaml)"
          # env block consumed by Dokploy's ${VAR} substitution into the compose.
          ENV_BLOCK=$(cat <<EOF
          IMAGE=${IMAGE}
          DATABASE_URL=${DEV_DATABASE_URL}
          APP_URL=${APP_URL}
          BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
          R2_ENDPOINT=${R2_ENDPOINT}
          R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
          R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
          R2_BUCKET=${R2_BUCKET}
          R2_PUBLIC_URL=${R2_PUBLIC_URL}
          RESEND_API_KEY=${RESEND_API_KEY}
          EOF
          )
          # Update compose source + env, then deploy. jq builds safe JSON.
          jq -n --arg id "$COMPOSE_ID" --arg cf "$COMPOSE_FILE" --arg env "$ENV_BLOCK" \
            '{composeId:$id, sourceType:"raw", composeType:"stack", composeFile:$cf, env:$env}' \
            | curl -sf -X POST "$DOKPLOY_URL/api/compose.update" \
                -H "x-api-key: $DOKPLOY_TOKEN" -H "content-type: application/json" --data @-
          curl -sf -X POST "$DOKPLOY_URL/api/compose.deploy" \
            -H "x-api-key: $DOKPLOY_TOKEN" -H "content-type: application/json" \
            -d "{\"composeId\":\"$COMPOSE_ID\"}"
          echo "Triggered Dokploy redeploy of $IMAGE"
