name: Deploy (dev)

# Reusable deployment called only after the CI job for the same main-branch
# commit succeeds. It builds the BeaconHS image on GitHub-hosted runners, then
# asks the self-hosted Dokploy runner to migrate and redeploy the dev stack.
# All deployment-specific values live in repository secrets.

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      operation:
        description: Maintenance operation to run without deploying
        required: true
        type: choice
        options:
          - rotate-compose-refresh-token

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/braedonsaunders/beaconhs

jobs:
  rotate-compose-refresh-token:
    name: Rotate Dokploy compose refresh token
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'rotate-compose-refresh-token'
    runs-on: [self-hosted, dokploy]
    timeout-minutes: 5
    steps:
      - name: Rotate and verify without logging either token
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          set -euo pipefail
          umask 077
          before="$(mktemp)"
          after="$(mktemp)"
          trap 'rm -f "$before" "$after"' EXIT
          base="${DOKPLOY_URL%/}"

          curl -sS --fail -G -o "$before" "$base/api/compose.one" \
            -H "x-api-key: $DOKPLOY_TOKEN" \
            --data-urlencode "composeId=$COMPOSE_ID"
          old_token="$(jq -er '.refreshToken | select(type == "string" and length > 0)' "$before")"
          echo "::add-mask::$old_token"

          rotate_status="$(
            jq -n --arg id "$COMPOSE_ID" '{composeId:$id}' \
              | curl -sS -o /dev/null -w "%{http_code}" \
                  -X POST "$base/api/compose.refreshToken" \
                  -H "x-api-key: $DOKPLOY_TOKEN" \
                  -H "content-type: application/json" --data @-
          )" || { echo "::error::Dokploy compose.refreshToken request failed"; exit 1; }
          if [ "$rotate_status" -lt 200 ] || [ "$rotate_status" -ge 300 ]; then
            echo "::error::Dokploy compose.refreshToken returned HTTP ${rotate_status}"
            exit 1
          fi

          curl -sS --fail -G -o "$after" "$base/api/compose.one" \
            -H "x-api-key: $DOKPLOY_TOKEN" \
            --data-urlencode "composeId=$COMPOSE_ID"
          new_token="$(jq -er '.refreshToken | select(type == "string" and length > 0)' "$after")"
          echo "::add-mask::$new_token"
          if [ "$old_token" = "$new_token" ]; then
            echo "::error::Dokploy returned the same compose refresh token"
            exit 1
          fi
          echo "Dokploy compose refresh token rotated and verified"

  build:
    if: github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:dev
          cache-from: type=gha
          # ignore-error: the GHA cache backend intermittently fails the blob
          # write ("error writing layer blob: not_found") AFTER the image is
          # already pushed — don't let a cache hiccup fail the build/deploy.
          cache-to: type=gha,mode=max,ignore-error=true

  deploy:
    needs: build
    runs-on: [self-hosted, dokploy]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      # No version here — package.json's packageManager field pins pnpm, and
      # passing both errors with "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24.18.0 }
      - run: pnpm install --frozen-lockfile

      - name: Migrate (schema + RLS + views)
        env:
          # Migrations + DDL connect DIRECT to Postgres (not the PgBouncer
          # pooler) as the table owner. migrate.ts prefers DIRECT_DATABASE_URL.
          DIRECT_DATABASE_URL: ${{ secrets.DEV_DIRECT_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
        run: pnpm --filter @beaconhs/db exec tsx src/migrate.ts

      # Ensure the deployment host can pull the just-built image before
      # updating Dokploy's stored compose definition.
      - name: Pre-pull image onto swarm manager
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! command -v docker >/dev/null 2>&1; then
            echo "::error::docker CLI not present on runner (socket mount expected)"; exit 1
          fi
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker pull "${IMAGE_NAME}:${GITHUB_SHA}"
          docker image inspect "${IMAGE_NAME}:${GITHUB_SHA}" --format 'pulled {{.Id}}'

      # Best-effort refresh for Dokploy's stored registry credential. The
      # image is already pre-pulled onto the constrained swarm manager above,
      # so a Dokploy API shape/version mismatch here should not block deploy.
      - name: Refresh GHCR pull credential on Dokploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          REGISTRY_ID: ${{ secrets.DOKPLOY_REGISTRY_ID }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          status="$(
            jq -n --arg id "$REGISTRY_ID" --arg u "$GHCR_USER" --arg p "$GHCR_TOKEN" \
              '{registryId:$id, registryName:"ghcr-beaconhs", username:$u, password:$p,
                registryUrl:"ghcr.io", imagePrefix:"braedonsaunders", registryType:"cloud"}' \
              | curl -sS -o /dev/null -w "%{http_code}" -X POST "$DOKPLOY_URL/api/registry.update" \
                  -H "x-api-key: $DOKPLOY_TOKEN" -H "content-type: application/json" --data @- || true
          )"
          if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
            echo "GHCR credential refreshed"
          else
            echo "::warning::Dokploy registry.update returned HTTP ${status}; continuing because the image was pre-pulled on the deployment host."
          fi

      # The collabora service bind-mounts this file over its stock branding.js
      # (BeaconHS theme). The runner only has the docker socket, so write the
      # host file through a helper container. coolwsd caches browser assets in
      # memory at startup, so a changed file needs the collabora service
      # force-updated before it is actually served.
      - name: Install Collabora branding on the swarm manager
        run: |
          set -euo pipefail
          before="$(docker run --rm -v /etc/dokploy/beaconhs:/target alpine:3 \
            sh -c 'sha256sum /target/collabora-branding.js 2>/dev/null | cut -d" " -f1' || true)"
          docker run --rm -i -v /etc/dokploy/beaconhs:/target alpine:3 \
            sh -c 'cat > /target/collabora-branding.js && chmod 0644 /target/collabora-branding.js' \
            < deploy/collabora-branding.js
          after="$(sha256sum deploy/collabora-branding.js | cut -d' ' -f1)"
          echo "branding installed ($(wc -c < deploy/collabora-branding.js) bytes)"
          if [ "$before" != "$after" ]; then
            svc="$(docker service ls --format '{{.Name}}' | grep -i collabora | head -1 || true)"
            if [ -n "$svc" ]; then
              echo "branding changed — restarting $svc so coolwsd re-caches it"
              docker service update --force "$svc" >/dev/null
            else
              echo "::warning::branding changed but no collabora service found to restart"
            fi
          else
            echo "branding unchanged — no restart needed"
          fi

      - name: Update env + redeploy on Dokploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          REGISTRY_ID: ${{ secrets.DOKPLOY_REGISTRY_ID }}
          DEV_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          DEV_SUPERADMIN_DATABASE_URL: ${{ secrets.DEV_SUPERADMIN_DATABASE_URL }}
          DEV_DIRECT_DATABASE_URL: ${{ secrets.DEV_DIRECT_DATABASE_URL }}
          REDIS_URL: ${{ secrets.DEV_REDIS_URL }}
          APP_URL: ${{ secrets.DEV_APP_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.DEV_BETTER_AUTH_SECRET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          set -euo pipefail
          IMAGE="${IMAGE_NAME}:${GITHUB_SHA}"
          COMPOSE_FILE="$(cat deploy/dokploy-dev.compose.yaml)"
          # Collabora is served same-origin on the app domain (Traefik path
          # routes), so both editor and WOPI-callback bases are APP_URL; the
          # server_name is the bare host for Collabora's generated URLs.
          APP_HOST="$(printf '%s' "$APP_URL" | sed -E 's~^https?://~~; s~/+$~~')"
          ENV_BLOCK="IMAGE=${IMAGE}
          COLLABORA_URL=${APP_URL}
          COLLABORA_WOPI_URL=${APP_URL}
          COLLABORA_SERVER_NAME=${APP_HOST}
          DATABASE_URL=${DEV_DATABASE_URL}
          SUPERADMIN_DATABASE_URL=${DEV_SUPERADMIN_DATABASE_URL}
          DIRECT_DATABASE_URL=${DEV_DIRECT_DATABASE_URL}
          REDIS_URL=${REDIS_URL}
          APP_URL=${APP_URL}
          BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
          R2_ENDPOINT=${R2_ENDPOINT}
          R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
          R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
          R2_BUCKET=${R2_BUCKET}
          R2_PUBLIC_URL=${R2_PUBLIC_URL}
          RESEND_API_KEY=${RESEND_API_KEY}
          VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
          VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
          VAPID_SUBJECT=${VAPID_SUBJECT}"
          update_status="$(
            jq -n --arg id "$COMPOSE_ID" --arg cf "$COMPOSE_FILE" --arg env "$ENV_BLOCK" --arg reg "$REGISTRY_ID" \
              '{composeId:$id, sourceType:"raw", composeType:"stack", composeFile:$cf, env:$env, registryId:$reg}' \
              | curl -sS -o /dev/null -w "%{http_code}" -X POST "$DOKPLOY_URL/api/compose.update" \
                  -H "x-api-key: $DOKPLOY_TOKEN" -H "content-type: application/json" --data @-
          )" || { echo "::error::Dokploy compose.update request failed"; exit 1; }
          if [ "$update_status" -lt 200 ] || [ "$update_status" -ge 300 ]; then
            echo "::error::Dokploy compose.update returned HTTP ${update_status}"
            exit 1
          fi
          deploy_status="$(
            curl -sS -o /dev/null -w "%{http_code}" -X POST "$DOKPLOY_URL/api/compose.deploy" \
              -H "x-api-key: $DOKPLOY_TOKEN" -H "content-type: application/json" \
              -d "{\"composeId\":\"$COMPOSE_ID\"}"
          )" || { echo "::error::Dokploy compose.deploy request failed"; exit 1; }
          if [ "$deploy_status" -lt 200 ] || [ "$deploy_status" -ge 300 ]; then
            echo "::error::Dokploy compose.deploy returned HTTP ${deploy_status}"
            exit 1
          fi
          echo "Redeployed $IMAGE"

      # Same-origin Traefik routes for the Collabora editor: /browser, /cool
      # and /hosting on the app domain → collabora:9980. Idempotent (skips
      # paths that already exist) and cloned from the app domain's TLS config.
      # Best-effort: a Dokploy API shape mismatch must not fail the app deploy —
      # without these routes the editor just reports "not configured".
      - name: Ensure Collabora path routes
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          APP_URL: ${{ secrets.DEV_APP_URL }}
        run: |
          set -uo pipefail
          host="$(printf '%s' "$APP_URL" | sed -E 's~^https?://~~; s~/+$~~')"
          existing="$(curl -sS "$DOKPLOY_URL/api/domain.byComposeId?composeId=$COMPOSE_ID" \
            -H "x-api-key: $DOKPLOY_TOKEN")" || { echo "::warning::domain.byComposeId failed"; exit 0; }
          if ! echo "$existing" | jq -e 'type=="array"' >/dev/null 2>&1; then
            response_type="$(echo "$existing" | jq -r 'type' 2>/dev/null || echo invalid-json)"
            echo "::warning::unexpected domain list response type: ${response_type}"; exit 0
          fi
          webdom="$(echo "$existing" | jq -c --arg h "$host" '[.[] | select(.host==$h)][0] // empty')"
          https="$(echo "$webdom" | jq -r 'if .https == false then "false" else "true" end' 2>/dev/null || echo true)"
          cert="$(echo "$webdom" | jq -r '.certificateType // "none"' 2>/dev/null || echo none)"
          for path in /browser /cool /hosting; do
            if echo "$existing" | jq -e --arg h "$host" --arg p "$path" \
                '.[] | select(.host==$h and .path==$p)' >/dev/null; then
              echo "route $path already present"; continue
            fi
            status="$(jq -n --arg cid "$COMPOSE_ID" --arg h "$host" --arg p "$path" \
                --argjson https "$https" --arg cert "$cert" \
                '{composeId:$cid, host:$h, path:$p, port:9980, https:$https,
                  certificateType:$cert, serviceName:"collabora", domainType:"compose"}' \
              | curl -sS -o /dev/null -w "%{http_code}" -X POST "$DOKPLOY_URL/api/domain.create" \
                  -H "x-api-key: $DOKPLOY_TOKEN" -H "content-type: application/json" --data @-)"
            if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
              echo "created route $path -> collabora:9980"
            else
              echo "::warning::domain.create $path returned HTTP $status"
            fi
          done
