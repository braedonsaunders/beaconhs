name: Deploy (dev)

# Two jobs, because the cluster's self-hosted runners (myoung34/github-runner)
# have NO Docker socket and the Dokploy control plane / dev DB are LAN-only:
#   build  — GitHub-hosted (Docker + internet): build & push the image to GHCR.
#   deploy — self-hosted on the Dokploy LAN: run DB migrations + tell Dokploy to
#            redeploy the dev stack pinned to the freshly-pushed image tag.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/braedonsaunders/beaconhs

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: [self-hosted, dokploy]
    steps:
      - uses: actions/checkout@v4
      # No version here — package.json's packageManager field pins pnpm, and
      # passing both errors with "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      - name: Migrate (schema + RLS + views)
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
        run: pnpm --filter @beaconhs/db exec tsx src/migrate.ts

      # The swarm manager pulls our PRIVATE ghcr.io image, so it needs a working
      # credential. No long-lived read:packages PAT is available, but THIS job's
      # GITHUB_TOKEN can read the package it just pushed — so refresh the Dokploy
      # registry credential to it right before deploy. Dokploy then `docker
      # login`s + deploys with --with-registry-auth; the manager caches the image
      # after the first pull, so later container restarts don't need re-auth.
      - name: Refresh GHCR pull credential on Dokploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          REGISTRY_ID: ${{ secrets.DOKPLOY_REGISTRY_ID }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          jq -n --arg id "$REGISTRY_ID" --arg u "$GHCR_USER" --arg p "$GHCR_TOKEN" \
            '{registryId:$id, registryName:"ghcr-beaconhs", username:$u, password:$p,
              registryUrl:"ghcr.io", imagePrefix:"braedonsaunders", registryType:"cloud"}' \
            | curl -sf -X POST "$DOKPLOY_URL/api/registry.update" \
                -H "x-api-key: $DOKPLOY_TOKEN" -H "content-type: application/json" --data @-
          echo "GHCR credential refreshed"

      - name: Update env + redeploy on Dokploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          REGISTRY_ID: ${{ secrets.DOKPLOY_REGISTRY_ID }}
          DEV_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          APP_URL: ${{ secrets.DEV_APP_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.DEV_BETTER_AUTH_SECRET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          set -euo pipefail
          IMAGE="${IMAGE_NAME}:${GITHUB_SHA}"
          COMPOSE_FILE="$(cat deploy/dokploy-dev.compose.yaml)"
          ENV_BLOCK="IMAGE=${IMAGE}
          DATABASE_URL=${DEV_DATABASE_URL}
          APP_URL=${APP_URL}
          BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
          R2_ENDPOINT=${R2_ENDPOINT}
          R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
          R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
          R2_BUCKET=${R2_BUCKET}
          R2_PUBLIC_URL=${R2_PUBLIC_URL}
          RESEND_API_KEY=${RESEND_API_KEY}"
          jq -n --arg id "$COMPOSE_ID" --arg cf "$COMPOSE_FILE" --arg env "$ENV_BLOCK" --arg reg "$REGISTRY_ID" \
            '{composeId:$id, sourceType:"raw", composeType:"stack", composeFile:$cf, env:$env, registryId:$reg}' \
            | curl -sf -X POST "$DOKPLOY_URL/api/compose.update" \
                -H "x-api-key: $DOKPLOY_TOKEN" -H "content-type: application/json" --data @-
          curl -sf -X POST "$DOKPLOY_URL/api/compose.deploy" \
            -H "x-api-key: $DOKPLOY_TOKEN" -H "content-type: application/json" \
            -d "{\"composeId\":\"$COMPOSE_ID\"}"
          echo "Redeployed $IMAGE"
