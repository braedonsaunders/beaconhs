name: CodeFlow Card
on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  card:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: braedonsaunders/codeflow/card@v1
        with:
          style: compact
          theme: auto
          accent: teal
          receipts: false
          # Informational only — no health grade/score, no language-ratio
          # breakdown. `scale` keeps the file/function/LOC/language counts.
          # `grade` (HEALTH) and `languages` are intentionally omitted.
          panels: scale
