name: CodeFlow Card
on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  card:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: braedonsaunders/codeflow/card@af3b0073f2b41c9f54938c6520509fd97d133803 # v1
        with:
          style: compact
          theme: auto
          accent: teal
          receipts: false
          # Public README — show structure, not judgment (matches bidwright).
          # NB: `panels` only applies to style=detailed, so it can't hide the
          # compact card's HEALTH grade; these flags do.
          show-grade: false
          show-score: false
