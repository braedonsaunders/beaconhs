name: CodeFlow Card
on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  card:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: braedonsaunders/codeflow/card@af3b0073f2b41c9f54938c6520509fd97d133803 # v1
        with:
          style: compact
          theme: auto
          accent: teal
          receipts: false
          # Public README — show structure, not judgment (matches bidwright).
          # NB: `panels` only applies to style=detailed, so it can't hide the
          # compact card's HEALTH grade; these flags do.
          show-grade: false
          show-score: false
