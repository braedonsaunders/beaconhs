<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 468 116" width="468" role="img" aria-label="beaconHS">
  <!-- beaconHS animated brand lockup (light variant). Self-contained CSS-only:
       the lighthouse builds from the base up, the lamp ignites, the rays beam
       out, the wordmark writes itself — then the whole logo redraws on a 12s
       cycle (rays retract into the lamp during teardown). Resting styles are
       the fully drawn logo; intros start hidden via fill-mode:backwards, so
       renderers that disable image animations still show the complete lockup.
       Mirror of apps/web/src/components/brand-logo.tsx — keep in sync. -->
  <style>
    @keyframes draw { from { stroke-dashoffset: 1 } }
    @keyframes fade { from { opacity: 0 } }
    @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.3 } }
    @keyframes ignite { from { opacity: 0 } 55% { opacity: 0.95 } to { opacity: 0.45 } }
    @keyframes cycle {
      0% { stroke-dashoffset: 0; opacity: 1 }
      2% { stroke-dashoffset: 0; opacity: 0 }
      2.05% { stroke-dashoffset: 1; opacity: 1; animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1) }
      6.65% { stroke-dashoffset: 0 }
      100% { stroke-dashoffset: 0 }
    }
    @keyframes rayCycle {
      0% { stroke-dashoffset: 0 }
      2% { stroke-dashoffset: 1 }
      3% { stroke-dashoffset: 1; animation-timing-function: ease-out }
      5.9% { stroke-dashoffset: 0 }
      100% { stroke-dashoffset: 0 }
    }
    @keyframes lampCycle {
      0% { opacity: 1 } 2% { opacity: 0 } 4.5% { opacity: 0 } 6% { opacity: 1 } 100% { opacity: 1 }
    }
    @keyframes glowCycle {
      0% { opacity: 0.45 } 2% { opacity: 0 } 4.5% { opacity: 0 } 5.5% { opacity: 0.95 } 8% { opacity: 0.45 } 100% { opacity: 0.45 }
    }
    .s {
      stroke-dasharray: 1;
      animation:
        draw 0.5s cubic-bezier(0.4, 0, 0.2, 1) var(--bd, 0s) backwards,
        cycle 12s linear calc(var(--bd, 0s) + 12s) infinite;
    }
    .r {
      stroke-dasharray: 1;
      animation:
        draw 0.35s ease-out var(--bd, 0s) backwards,
        rayCycle 12s linear calc(var(--bd, 0s) + 12s) infinite,
        pulse 2s ease-in-out var(--bp, 0s) infinite;
    }
    .l {
      animation:
        fade 0.5s ease-out var(--bd, 0s) backwards,
        lampCycle 12s linear calc(var(--bd, 0s) + 12s) infinite;
    }
    .g {
      animation:
        ignite 0.9s ease-out var(--bd, 0s) backwards,
        glowCycle 12s linear calc(var(--bd, 0s) + 12s) infinite;
    }
    @media (prefers-reduced-motion: reduce) {
      .s, .r, .l, .g { animation: none }
    }
  </style>
  <filter id="glow" x="-150%" y="-150%" width="400%" height="400%">
    <feGaussianBlur stdDeviation="3" />
  </filter>
  <!-- lighthouse mark -->
  <g transform="translate(0 5)">
    <g fill="none" stroke="#1B2B4A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <path class="s" style="--bd:.05s" pathLength="1" d="M4 101L44 101" />
      <path class="s" style="--bd:.11s" pathLength="1" d="M17 55L11 101" />
      <path class="s" style="--bd:.17s" pathLength="1" d="M31 55L37 101" />
      <path class="s" style="--bd:.23s" pathLength="1" d="M14.8 72L32.2 64.5" />
      <path class="s" style="--bd:.29s" pathLength="1" d="M12.2 92L34.9 84.5" />
      <path class="s" style="--bd:.35s" pathLength="1" d="M10.5 55L37.5 55" />
      <path class="s" style="--bd:.41s" pathLength="1" d="M16 38L32 38L32 53L16 53Z" />
      <path class="s" style="--bd:.47s" pathLength="1" d="M11.5 38L24 24L36.5 38Z" />
    </g>
    <circle class="g" style="--bd:.85s" cx="24" cy="45.75" r="6" fill="#F5A623" opacity="0.45" filter="url(#glow)" />
    <rect class="l" style="--bd:.85s" x="20.5" y="42.5" width="7" height="6.5" rx="1.6" fill="#F5A623" />
    <!-- rays beam outward from the lamp (paths run inner → outer) -->
    <g fill="none" stroke="#F5A623" stroke-width="5" stroke-linecap="round">
      <path class="r" style="--bd:1s;--bp:0s" pathLength="1" d="M15.1 20.8L2.9 16.4" />
      <path class="r" style="--bd:1.07s;--bp:.16s" pathLength="1" d="M18.6 16.2L11.1 5.6" />
      <path class="r" style="--bd:1.14s;--bp:.32s" pathLength="1" d="M24 14.5L24 3" />
      <path class="r" style="--bd:1.21s;--bp:.48s" pathLength="1" d="M29.4 16.2L36.9 5.6" />
      <path class="r" style="--bd:1.28s;--bp:.64s" pathLength="1" d="M32.9 20.8L45.1 16.4" />
    </g>
  </g>
  <!-- wordmark: monoline "beacon" (ink) + "HS" (amber) -->
  <g transform="translate(68 48) scale(0.44)" fill="none" stroke-width="20" stroke-linecap="butt" stroke-linejoin="round">
    <g stroke="#1B2B4A">
      <path class="s" style="--bd:.3s" pathLength="1" d="M10 -38L10 100" />
      <circle class="s" style="--bd:.3s" pathLength="1" cx="60" cy="50" r="40" />
    </g>
    <g transform="translate(124 0)" stroke="#1B2B4A">
      <path class="s" style="--bd:.36s" pathLength="1" d="M90 50A40 40 0 1 0 75.7 80.6" />
      <path class="s" style="--bd:.36s" pathLength="1" d="M10 50L100 50" />
    </g>
    <g transform="translate(238 0)" stroke="#1B2B4A">
      <circle class="s" style="--bd:.42s" pathLength="1" cx="50" cy="50" r="40" />
      <path class="s" style="--bd:.42s" pathLength="1" d="M90 0L90 100" />
    </g>
    <g transform="translate(352 0)" stroke="#1B2B4A">
      <path class="s" style="--bd:.48s" pathLength="1" d="M79.7 23.2A40 40 0 1 0 79.7 76.8" />
    </g>
    <g transform="translate(460 0)" stroke="#1B2B4A">
      <circle class="s" style="--bd:.54s" pathLength="1" cx="50" cy="50" r="40" />
    </g>
    <g transform="translate(574 0)" stroke="#1B2B4A">
      <path class="s" style="--bd:.6s" pathLength="1" d="M10 0L10 100" />
      <path class="s" style="--bd:.6s" pathLength="1" d="M10 50A40 40 0 0 1 90 50L90 100" />
    </g>
    <g transform="translate(690 0)" stroke="#F5A623">
      <path class="s" style="--bd:.66s" pathLength="1" d="M10 -36L10 100" />
      <path class="s" style="--bd:.66s" pathLength="1" d="M90 -36L90 100" />
      <path class="s" style="--bd:.66s" pathLength="1" d="M10 32L90 32" />
    </g>
    <g transform="translate(804 0)" stroke="#F5A623">
      <path class="s" style="--bd:.72s" pathLength="1" d="M76.6 -12.5A33 27 0 1 0 48 28A37 31 0 1 1 16 74.5" />
    </g>
  </g>
</svg>
