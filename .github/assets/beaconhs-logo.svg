<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 468 116" width="468" role="img" aria-label="beaconHS">
  <!-- beaconHS animated brand lockup (light variant). Self-contained CSS-only
       draw-in + looping beacon sweep. The resting styles are the fully drawn
       logo; the animation starts from hidden via fill-mode:backwards, so any
       renderer that freezes or disables image animations still shows the
       complete static logo instead of a blank frame.
       Mirror of apps/web/src/components/brand-logo.tsx — keep in sync. -->
  <style>
    @keyframes draw { from { stroke-dashoffset: 1 } }
    @keyframes fade { from { opacity: 0 } }
    @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.3 } }
    .d {
      stroke-dasharray: 1;
      animation: draw 0.55s cubic-bezier(0.4, 0, 0.2, 1) var(--bd, 0s) backwards;
    }
    .f { animation: fade 0.5s ease-out var(--bd, 0s) backwards }
    .fp {
      animation:
        fade 0.5s ease-out var(--bd, 0s) backwards,
        pulse 2s ease-in-out calc(var(--bd, 0s) + 0.9s) infinite;
    }
    @media (prefers-reduced-motion: reduce) {
      .d, .f, .fp { animation: none }
    }
  </style>
  <filter id="glow" x="-150%" y="-150%" width="400%" height="400%">
    <feGaussianBlur stdDeviation="3" />
  </filter>
  <!-- lighthouse mark -->
  <g transform="translate(0 5)">
    <g fill="none" stroke="#1B2B4A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <path class="d" style="--bd:.05s" pathLength="1" d="M4 101L44 101" />
      <path class="d" style="--bd:.13s" pathLength="1" d="M17 55L11 101" />
      <path class="d" style="--bd:.21s" pathLength="1" d="M31 55L37 101" />
      <path class="d" style="--bd:.29s" pathLength="1" d="M14.8 72L32.2 64.5" />
      <path class="d" style="--bd:.37s" pathLength="1" d="M12.2 92L34.9 84.5" />
      <path class="d" style="--bd:.45s" pathLength="1" d="M10.5 55L37.5 55" />
      <path class="d" style="--bd:.53s" pathLength="1" d="M16 38L32 38L32 53L16 53Z" />
      <path class="d" style="--bd:.61s" pathLength="1" d="M11.5 38L24 24L36.5 38Z" />
    </g>
    <circle class="fp" style="--bd:.95s" cx="24" cy="45.75" r="6" fill="#F5A623" opacity="0.4" filter="url(#glow)" />
    <rect class="f" style="--bd:.95s" x="20.5" y="42.5" width="7" height="6.5" rx="1.6" fill="#F5A623" />
    <g fill="none" stroke="#F5A623" stroke-width="5" stroke-linecap="round">
      <path class="fp" style="--bd:1.05s" d="M15.1 20.8L2.9 16.4" />
      <path class="fp" style="--bd:1.14s" d="M18.6 16.2L11.1 5.6" />
      <path class="fp" style="--bd:1.23s" d="M24 14.5L24 3" />
      <path class="fp" style="--bd:1.32s" d="M29.4 16.2L36.9 5.6" />
      <path class="fp" style="--bd:1.41s" d="M32.9 20.8L45.1 16.4" />
    </g>
  </g>
  <!-- wordmark: monoline "beacon" (ink) + "HS" (amber) -->
  <g transform="translate(68 48) scale(0.44)" fill="none" stroke-width="20" stroke-linecap="butt" stroke-linejoin="round">
    <g stroke="#1B2B4A">
      <path class="d" style="--bd:.35s" pathLength="1" d="M10 -38L10 100" />
      <circle class="d" style="--bd:.35s" pathLength="1" cx="60" cy="50" r="40" />
    </g>
    <g transform="translate(124 0)" stroke="#1B2B4A">
      <path class="d" style="--bd:.42s" pathLength="1" d="M90 50A40 40 0 1 0 75.7 80.6" />
      <path class="d" style="--bd:.42s" pathLength="1" d="M10 50L100 50" />
    </g>
    <g transform="translate(238 0)" stroke="#1B2B4A">
      <circle class="d" style="--bd:.49s" pathLength="1" cx="50" cy="50" r="40" />
      <path class="d" style="--bd:.49s" pathLength="1" d="M90 0L90 100" />
    </g>
    <g transform="translate(352 0)" stroke="#1B2B4A">
      <path class="d" style="--bd:.56s" pathLength="1" d="M79.7 23.2A40 40 0 1 0 79.7 76.8" />
    </g>
    <g transform="translate(460 0)" stroke="#1B2B4A">
      <circle class="d" style="--bd:.63s" pathLength="1" cx="50" cy="50" r="40" />
    </g>
    <g transform="translate(574 0)" stroke="#1B2B4A">
      <path class="d" style="--bd:.7s" pathLength="1" d="M10 0L10 100" />
      <path class="d" style="--bd:.7s" pathLength="1" d="M10 50A40 40 0 0 1 90 50L90 100" />
    </g>
    <g transform="translate(690 0)" stroke="#F5A623">
      <path class="d" style="--bd:.77s" pathLength="1" d="M10 -36L10 100" />
      <path class="d" style="--bd:.77s" pathLength="1" d="M90 -36L90 100" />
      <path class="d" style="--bd:.77s" pathLength="1" d="M10 32L90 32" />
    </g>
    <g transform="translate(804 0)" stroke="#F5A623">
      <path class="d" style="--bd:.84s" pathLength="1" d="M76.6 -12.5A33 27 0 1 0 48 28A37 31 0 1 1 16 74.5" />
    </g>
  </g>
</svg>
